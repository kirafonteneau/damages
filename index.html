<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Workers' Firm — Employment Damages Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root {
  /* Brand palette — synced with theworkersfirm.com */
  --navy: #0F2327;          /* deep teal-black, primary dark */
  --navy-2: #1A3338;        /* hover / panel-darker */
  --navy-3: #284449;        /* tertiary dark */
  --gold: #C9A85A;          /* warm accent (table headers, banners) */
  --gold-h: #DDB96E;
  --gold-d: #9A7A35;
  --gold-bg: rgba(201,168,90,0.10);
  --gold-border: rgba(201,168,90,0.35);
  --highlight: #F4FE7C;     /* signature TWF yellow — running totals, key amounts */
  --mint: #BCDBDB;          /* secondary highlight */
  --teal-pale: #DFEBEC;     /* on-dark text / panels */
  --cream: #F6F7F3;         /* page bg — matches site */
  --white: #FFFFFF;
  --gray-50: #EFF1F0;
  --gray-100: #DCDFDD;
  --gray-200: #B6BBB9;
  --gray-400: #69727B;      /* body muted text */
  --gray-600: #3D4549;
  --text: #0F2327;          /* primary text — matches site body */
  --text-2: #69727B;
  --danger: #AC3939;        /* matches site CTA red */
  --danger-bg: rgba(172,57,57,0.08);
  --success: #2D6E4A;
  --r: 8px;
  --r-lg: 14px;
  --shadow: 0 1px 3px rgba(15,35,39,0.06), 0 4px 16px rgba(15,35,39,0.08);
  /* Brand fonts */
  --font-display: 'Cormorant Garamond', 'Tobias-light', Georgia, serif;
  --font-body: 'Poppins', Tahoma, sans-serif;
  --font-data: 'Noto Sans', 'Poppins', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body);background:var(--cream);color:var(--text);font-size:14px;line-height:1.55}

/* ── Header ── */
.app-header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;flex-shrink:0;border-bottom:2px solid var(--gold)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--navy)}
.logo-text{font-family:var(--font-body);font-weight:600;font-size:14px;color:#fff;line-height:1.2;letter-spacing:.05em;text-transform:uppercase}
.logo-sub{font-size:9px;font-weight:400;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;display:block}
.header-right{display:flex;align-items:center;gap:8px}
.save-indicator{font-size:11px;color:var(--gray-200);padding:3px 10px;border:1px solid rgba(255,255,255,.15);border-radius:20px}
.save-indicator.saved{color:#7AE09A;border-color:rgba(122,224,154,.3)}

/* ── Case bar ── */
.case-bar{background:var(--white);border-bottom:1px solid var(--gray-100);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.case-select{font-size:13px;font-weight:500;padding:6px 10px;border:1px solid var(--gray-100);border-radius:var(--r);background:#fff;cursor:pointer;min-width:220px}
.case-bar-total{margin-left:auto;text-align:right}
.case-bar-total-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400)}
.case-bar-total-value{font-family:var(--font-display);font-size:24px;font-weight:500;color:var(--gold-d);letter-spacing:.01em}

/* ── Layout ── */
.app-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main-area{display:flex;flex:1;overflow:hidden}
.tab-sidebar{width:168px;flex-shrink:0;background:var(--navy-2);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.tab-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.55);border:none;background:none;text-align:left;width:100%;transition:all .15s;border-left:3px solid transparent}
.tab-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.tab-btn.active{color:#fff;background:rgba(200,165,90,.12);border-left-color:var(--gold);font-weight:500}
.tab-btn .t-icon{font-size:14px;opacity:.7}
.tab-section-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:16px 16px 6px}
.tab-content{flex:1;overflow-y:auto;padding:20px}

/* ── Cards ── */
.card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--navy);margin-bottom:4px;letter-spacing:.005em}
.card-sub{font-size:12px;color:var(--gray-400);margin-bottom:14px}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:4px;display:block}
.info-box{background:var(--gold-bg);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;font-size:12.5px;color:var(--navy-2);margin-bottom:14px;line-height:1.6}
.danger-box{background:var(--danger-bg);border-left:3px solid var(--danger);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;font-size:12px;color:var(--danger);margin-bottom:14px}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col-span-2{grid-column:span 2}
.col-span-3{grid-column:span 3}

/* ── Inputs ── */
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;border:1px solid var(--gray-100);border-radius:var(--r);padding:8px 10px;font-size:13px;font-family:var(--font-body);color:var(--text);background:#fff;transition:border-color .15s
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
input[type=radio],input[type=checkbox]{width:auto}
input::placeholder{color:var(--gray-200)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font-body)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600}
.btn-gold:hover{background:var(--gold-h)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-2)}
.btn-ghost{background:none;border:1px solid var(--gray-100);color:var(--text-2)}
.btn-ghost:hover{border-color:var(--gray-200);background:var(--gray-50)}
.btn-danger{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-add{width:100%;border:1.5px dashed var(--gray-200);background:none;border-radius:var(--r);padding:9px;color:var(--gray-400);cursor:pointer;font-size:13px;margin-top:8px;transition:all .15s}
.btn-add:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-remove{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.btn-remove:hover{color:var(--danger);background:var(--danger-bg)}

/* ── Incident cards ── */
.incident-card{border:1px solid var(--gray-100);border-radius:var(--r);padding:14px;margin-bottom:10px;position:relative}
.incident-card.has-end{border-color:var(--gold-border);background:linear-gradient(135deg,#fff,#FDFBF5)}

/* ── Metric cards ── */
.metric-card{background:var(--gray-50);border-radius:var(--r);padding:12px 14px}
.metric-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:var(--text);font-family:var(--font-display);letter-spacing:.005em}
.metric-value.gold{color:var(--gold-d)}
.metric-sub{font-size:11px;color:var(--gray-400);margin-top:2px}

/* ── Total banner ── */
.total-banner{background:var(--navy);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.total-banner-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.total-banner-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}
.total-banner-amount{font-family:var(--font-display);font-size:48px;font-weight:500;color:var(--highlight);letter-spacing:.005em}

/* ── Tables ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px;font-family:var(--font-data);font-variant-numeric:tabular-nums}
thead th{padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:1.5px solid var(--gray-100);white-space:nowrap}
thead th.r{text-align:right}
tbody td{padding:8px 10px;border-bottom:1px solid var(--gray-50)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--gray-50)}
td.r{text-align:right}
td.bold{font-weight:500}
td.gold{color:var(--gold-d);font-weight:500}
tfoot td{padding:10px 10px;font-weight:600;background:var(--navy);color:#fff;border-top:2px solid var(--navy-3)}
tfoot td.gold{color:var(--gold)}

/* ── Scenario tabs ── */
.scenario-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--gray-50);border-radius:var(--r);padding:3px}
.scenario-tab{flex:1;padding:7px 14px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:400;color:var(--gray-400);transition:all .15s;text-align:center}
.scenario-tab.active{background:#fff;color:var(--navy);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── Period toggle ── */
.period-toggle{display:inline-flex;border:1px solid var(--gray-100);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.period-btn{padding:6px 14px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--gray-400);font-weight:400;transition:all .15s}
.period-btn.active{background:var(--navy);color:#fff;font-weight:500}

/* ── Radio cards ── */
.radio-card{display:flex;gap:10px;padding:12px 14px;border:1px solid var(--gray-100);border-radius:var(--r);cursor:pointer;transition:all .15s;align-items:flex-start}
.radio-card.selected{border-color:var(--gold);background:var(--gold-bg)}
.radio-card-label{font-size:13px;font-weight:500;color:var(--navy)}
.radio-card-desc{font-size:11.5px;color:var(--gray-400);margin-top:2px}

/* ── Case modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:var(--r-lg);padding:24px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-family:var(--font-display);font-size:24px;font-weight:500;color:var(--navy);margin-bottom:4px;letter-spacing:.005em}
.modal-sub{font-size:12.5px;color:var(--gray-400);margin-bottom:18px}
.case-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--gray-100);border-radius:var(--r);margin-bottom:8px;transition:all .15s}
.case-list-item:hover{border-color:var(--gold-border);background:var(--gold-bg)}
.case-list-name{font-size:13px;font-weight:500;flex:1}
.case-list-date{font-size:11px;color:var(--gray-400)}

/* ── Disclaimer ── */
.disclaimer{background:var(--gray-50);border-radius:var(--r);padding:12px 14px;font-size:11px;color:var(--gray-400);line-height:1.7;margin-top:10px}

/* ── DOL rate grid ── */
.rate-cell{background:var(--gray-50);border-radius:var(--r);padding:10px;border:1px solid var(--gray-100)}
.rate-cell.custom{border-color:var(--gold-border);background:var(--gold-bg)}
.rate-cell input{border:none;background:transparent;font-size:15px;font-weight:500;color:var(--text);width:48px;padding:0;outline:none}
.rate-cell input:focus{color:var(--gold-d)}

/* ── Wage type toggle ── */
.wage-type-toggle{display:inline-flex;border:1px solid var(--gray-100);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.wage-type-btn{padding:6px 12px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--gray-400)}
.wage-type-btn.active{background:var(--navy);color:#fff}

/* ── FLSA weekly grid ── */
.flsa-weekly-banner{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--text-2);margin:10px 0;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.flsa-weekly-banner .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px}
.flsa-weekly-banner .pill strong{color:var(--text)}
.flsa-weekly-banner.warn{background:var(--gold-bg);border-color:var(--gold-border);color:var(--navy-2)}
.flsa-bulk-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 10px;background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r);margin-bottom:8px;position:sticky;top:0;z-index:5}
.flsa-bulk-bar .sel-count{font-size:11.5px;color:var(--gray-400);margin-right:6px}
.flsa-bulk-bar input[type=number],.flsa-bulk-bar input[type=text]{width:90px;padding:4px 6px;font-size:12px;border:1px solid var(--gray-200);border-radius:4px}
.flsa-bulk-bar select{padding:4px 6px;font-size:12px;border:1px solid var(--gray-200);border-radius:4px;background:#fff}
.flsa-week-table{width:100%;border-collapse:collapse;font-size:12px}
.flsa-week-table th{background:var(--gray-50);text-align:left;padding:6px 8px;font-weight:600;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--gray-100);position:sticky;top:42px;z-index:4}
.flsa-week-table th.r,.flsa-week-table td.r{text-align:right}
.flsa-week-table td{padding:5px 8px;border-bottom:1px solid var(--gray-50);vertical-align:middle}
.flsa-week-table tr.counted-inherit td{color:var(--gray-400)}
.flsa-week-table tr.counted-overridden td{color:var(--text)}
.flsa-week-table tr.counted-overridden td.ovr{color:var(--gold-d);font-weight:600}
.flsa-week-table tr.user-excluded td{color:var(--gray-400);background:repeating-linear-gradient(45deg,var(--gray-50),var(--gray-50) 6px,transparent 6px,transparent 12px)}
.flsa-week-table tr.sol-excluded td,.flsa-week-table tr.post-trial td{color:#999;background:#f4f2ee}
.flsa-week-table tr.partial td.days-cell{color:var(--gold-d);font-style:italic}
.flsa-week-table input.cell-input{width:70px;padding:2px 5px;font-size:12px;border:1px solid var(--gray-100);border-radius:3px;background:#fff;text-align:right}
.flsa-week-table input.cell-input:focus{border-color:var(--gold);outline:none}
.flsa-week-table input.cell-input.is-default{color:var(--gray-400);font-style:italic;background:transparent;border-color:transparent}
.flsa-week-table select.cell-input{width:auto;text-align:left}
.flsa-week-table .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:var(--gray-100);color:var(--gray-400);margin-left:4px}
.flsa-week-table .tag.gold{background:var(--gold-bg);color:var(--gold-d)}
.flsa-week-table .tag.warn{background:#fff1d6;color:#92400e}
.flsa-week-table .tag.muted{background:#f4f2ee;color:#888}
.flsa-month-group{margin-bottom:10px}
.flsa-month-header{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-2)}
.flsa-month-header:hover{background:var(--gold-bg);color:var(--navy-2)}
.rate-change-row{display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:8px;align-items:end;margin-bottom:6px}

/* ── Export bar ── */
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:3px}
.field-help-btn{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--gray-200);color:var(--gray-500);font-size:9px;font-weight:700;cursor:pointer;margin-left:4px;vertical-align:middle;user-select:none;flex-shrink:0}.field-help-btn:hover{background:var(--blue);color:#fff}.field-help-tip{display:none;position:absolute;z-index:200;background:#1a2332;color:#fff;font-size:11px;line-height:1.5;padding:8px 10px;border-radius:6px;max-width:280px;box-shadow:0 4px 12px rgba(0,0,0,.25);margin-top:4px;white-space:normal}.field-help-tip.visible{display:block}.section-label{position:relative}
.tab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:5px;vertical-align:middle;opacity:.85}.tab-dot-green{background:#1E6B3C}.tab-dot-orange{background:#C05A00}.tab-dot-none{display:none}
</style>
</head>
<body>
<div class="app-wrap">
  <!-- Header -->
  <div class="app-header">
    <div class="logo">
      <div class="logo-mark">W</div>
      <div class="logo-text">The Workers' Firm<span class="logo-sub">Employment Damages Calculator</span></div>
    </div>
    <div class="header-right">
      <span class="save-indicator" id="save-indicator">●  Not saved</span>
      <span class="save-indicator" id="conn-status" onclick="openBlobConfigModal()" style="cursor:pointer" title="Click to configure Azure Blob Storage">⚠ Local only</span>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)" onclick="openBlobConfigModal()" title="Configure shared storage">☁ Storage</button>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)" onclick="openCasesModal()">⊞ Cases</button>
      <button class="btn btn-gold btn-sm" onclick="saveCurrentCase()">Save</button>
    </div>
  </div>

  <!-- Case / scenario bar -->
  <div class="case-bar">
    <select class="case-select" id="case-select" onchange="loadCase(this.value)" title="Currently open case">
      <option value="">— New case (unsaved) —</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="newCase()">+ New case</button>
    <div style="display:flex;gap:6px;margin-left:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportJSON()">⬇ JSON</button>
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Import <input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
    </div>
    <div class="case-bar-total" id="header-total" style="display:none">
      <div class="case-bar-total-label">Total damages</div>
      <div class="case-bar-total-value" id="header-total-value">—</div>
    </div>
  </div>

  <div class="main-area">
    <!-- Sidebar tabs -->
    <div class="tab-sidebar">
      <div class="tab-section-label">Case</div>
      <button class="tab-btn active" onclick="showTab('setup')" id="tab-setup">
        <span class="t-icon">⚖</span> Setup
      <span class="tab-dot tab-dot-none" id="dot-setup"></span></button>
      <button class="tab-btn" onclick="showTab('incidents')" id="tab-incidents">
        <span class="t-icon">📅</span> Incidents
      <span class="tab-dot tab-dot-none" id="dot-incidents"></span></button>
      <div class="tab-section-label">Wages</div>
      <button class="tab-btn" onclick="showTab('wages')" id="tab-wages">
        <span class="t-icon">💰</span> Back Wages
      <span class="tab-dot tab-dot-none" id="dot-wages"></span></button>
      <button class="tab-btn" onclick="showTab('benefits')" id="tab-benefits">
        <span class="t-icon">🏥</span> Benefits
      <span class="tab-dot tab-dot-none" id="dot-benefits"></span></button>
      <button class="tab-btn" onclick="showTab('mitigation')" id="tab-mitigation">
        <span class="t-icon">↔</span> Mitigation
      <span class="tab-dot tab-dot-none" id="dot-mitigation"></span></button>
      <div class="tab-section-label">FLSA</div>

  padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:340px;line-height:1.5"></div>

<script>
// ─────────────────────────────────────────────
// 1. CONSTANTS
// ─────────────────────────────────────────────
const DOL_RATES = [
  {y:2018,q:1,r:4},{y:2018,q:2,r:5},{y:2018,q:3,r:5},{y:2018,q:4,r:5},
  {y:2019,q:1,r:6},{y:2019,q:2,r:6},{y:2019,q:3,r:5},{y:2019,q:4,r:5},
  {y:2020,q:1,r:5},{y:2020,q:2,r:3},{y:2020,q:3,r:3},{y:2020,q:4,r:3},
  {y:2021,q:1,r:3},{y:2021,q:2,r:3},{y:2021,q:3,r:3},{y:2021,q:4,r:3},
  {y:2022,q:1,r:3},{y:2022,q:2,r:4},{y:2022,q:3,r:6},{y:2022,q:4,r:6},
  {y:2023,q:1,r:7},{y:2023,q:2,r:7},{y:2023,q:3,r:7},{y:2023,q:4,r:8},
  {y:2024,q:1,r:8},{y:2024,q:2,r:8},{y:2024,q:3,r:8},{y:2024,q:4,r:8},
  {y:2025,q:1,r:7},{y:2025,q:2,r:7},{y:2025,q:3,r:7},{y:2025,q:4,r:7},
  {y:2026,q:1,r:7},{y:2026,q:2,r:7},
];
// BLS ECEC benefits rates — supplementary (voluntary) benefits only
// Excludes legally-required costs (SS/Medicare, FUTA, workers comp) which are not "lost benefits"
// Source: BLS ECEC Table 1, Q4 2024 (USDL-25-0379, Mar. 2025)
// Total benefits % of wages:  private 43.7%, state_local 61.0%, federal 71.0%
// Legally-required % of wages: private ~11.2%, state_local ~12.1%, federal ~11.7%
// Supplementary (applied):    private 32.5%, state_local 48.9%, federal 59.3%
const BLS = {private:32.5,state_local:48.9,federal:59.3};
const BLS_TOTAL = {private:43.7,state_local:61.0,federal:71.0};
const BLS_L = {private:'Private sector',state_local:'State / Local govt',federal:'Federal govt'};
const INC_TYPES = [
  {v:'termination',l:'Termination'},
  {v:'suspension',l:'Suspension (fixed period)'},
  {v:'demotion',l:'Demotion / Pay cut'},
  {v:'constructive',l:'Constructive discharge'},
  {v:'failure_hire',l:'Failure to hire'},
  {v:'failure_promote',l:'Failure to promote'},
  {v:'other',l:'Other adverse action'},
];

const uid = () => Math.random().toString(36).slice(2,9);
const $$ = n => n==null?'—':new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n);
const pct = n => n==null?'—':`${Number(n).toFixed(1)}%`;
const dt = d => {try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}};
// Date input helpers — used to constrain <input type="date"> to recent dates
// and to seed sensible defaults so a typo can't slip a year-0002 date through.
const todayISO = () => new Date().toISOString().slice(0,10);
const yearsAgoISO = (n) => { const d = new Date(); d.setFullYear(d.getFullYear() - n); return d.toISOString().slice(0,10); };
const yearsAheadISO = (n) => { const d = new Date(); d.setFullYear(d.getFullYear() + n); return d.toISOString().slice(0,10); };
// Sanity floor for any persisted date — anything older than this is treated as junk
// and ignored by compute (prevents runaway weekly iteration if a year-0002 date
// somehow survives in localStorage).
const MIN_VALID_DATE = '1900-01-01';
const isValidISODate = (s) => typeof s === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(s) && s >= MIN_VALID_DATE;

// ─────────────────────────────────────────────
// 2. STATE
// ─────────────────────────────────────────────
function defaultCase(name='New Case') {
  const sid = uid();
  return {
    id: uid(),
    name,
    savedAt: null,
    caseName:'', plaintiff:'', defendant:'', attorney:'',
    complaintFiledDate:'',
    employerType:'private', claimType:'both', statutoryBasis:'title_vii',
    benefitsMethod:'estimate', customBenefitsRate:'',
    scenarios:[{id:sid, name:'To Trial', trialDate:'', flsaWillful:true}],
    activeScenarioId: sid,
    displayPeriod:'annual',
    incidents:[{id:uid(), date:'', endDate:'', type:'termination', description:''}],
    wagePeriods:[{id:uid(), startDate:'', endDate:'', wageType:'annual',
      annualSalary:'', hourlyRate:'', hoursPerWeek:'40', overtimeHoursPerWeek:'', annualIncrease:'0',
      source:'paystub', bonus:'', bonusType:'fixed', commissionRate:'', commissions:'', employerBenefitsW2:''}],
    mitigationPeriods:[{id:uid(), startDate:'', endDate:'', annualWages:'', annualBenefits:0, hourlyRate:'', hoursPerWeek:'', overtimeHoursPerWeek:'', employer:'', notes:''}],
    flsaPeriods:[{id:uid(), startDate:yearsAgoISO(5), endDate:todayISO(), description:'', otMethod:'half',
      workweekStart:1, defaultRegularRate:'', defaultWeeklyHours:'',
      rateChanges:[], weekOverrides:{}, workweeks:[]}],
    frontPay:{years:2,projectedWage:'',projectedMitigation:''},
        customRates:{},
    employerSize:'500+',
    compensatoryItems:[],
    flsaMinWagePeriods:[]
  };
}

// ── Migration: bring older cases up to the current shape ──
function migrateFlsaPeriod(fp) {
  if (!fp) return fp;
  // Repair junk dates left behind by old typos (e.g. year-0002, 0005).
  // We *replace* with sensible defaults instead of blanking, because an empty
  // <input type="date"> opens its calendar picker at year 0001/0005 (browser
  // default), which is exactly the bug we're trying to kill.
  if (fp.startDate && !isValidISODate(fp.startDate)) fp.startDate = yearsAgoISO(5);
  if (fp.endDate   && !isValidISODate(fp.endDate))   fp.endDate   = todayISO();
  // Repair rate-change effective dates the same way — fall back to the
  // (now valid) period start so the picker opens in the right decade.
  if (Array.isArray(fp.rateChanges)) {
    fp.rateChanges.forEach(rc => {
      if (rc && rc.effectiveDate && !isValidISODate(rc.effectiveDate)) {
        rc.effectiveDate = fp.startDate || yearsAgoISO(5);
      }
    });
  }
  if (fp.defaultWeeklyHours !== undefined) {
    // Already migrated; just ensure newer fields exist
    if (fp.workweekStart === undefined) fp.workweekStart = 1;
    if (!Array.isArray(fp.rateChanges)) fp.rateChanges = [];
    if (!fp.weekOverrides || typeof fp.weekOverrides !== 'object') fp.weekOverrides = {};
    return fp;
  }
  const out = {
    id: fp.id || uid(),
    startDate: fp.startDate || '',
    endDate: fp.endDate || '',
    description: fp.description || '',
    otMethod: fp.otMethod || 'half',
    workweekStart: 1,
    defaultRegularRate: fp.regularRate || '',
    defaultWeeklyHours: fp.weeklyHours || '',
    rateChanges: [],
    weekOverrides: {}
  };
  if (!out.endDate && out.startDate && fp.weeksWorked) {
    const wks = parseInt(fp.weeksWorked, 10);
    if (Number.isFinite(wks) && wks > 0) {
      const d = new Date(out.startDate + 'T12:00:00');
      d.setDate(d.getDate() + wks * 7 - 1);
      out.endDate = d.toISOString().slice(0, 10);
    }
  }
  return out;
}

// Repair any persisted date field that fails our sanity check (e.g. year-0002
// from a typo before min/max were enforced). We *replace* with the supplied
// fallback rather than blanking, because empty <input type="date"> elements
// open their calendar picker at year 0001/0005 — the very bug we're fixing.
// Pass a fallback that makes contextual sense (e.g. yearsAgoISO(5) for a
// period start, todayISO() for an end date, '' only when blank is meaningful).
function scrubDate(obj, field, fallback = '') {
  if (obj && obj[field] && !isValidISODate(obj[field])) obj[field] = fallback;
}

function migrateCase(c) {
  if (!c || typeof c !== 'object') return c;
  if (c.complaintFiledDate === undefined) c.complaintFiledDate = '';
  if (c.statutoryBasis === undefined) c.statutoryBasis = 'title_vii';
  // Complaint filing date — default to today if junk; user can adjust.
  scrubDate(c, 'complaintFiledDate', todayISO());
  if (Array.isArray(c.scenarios)) {
    c.scenarios = c.scenarios.map(s => {
      const out = {
        flsaWillful: (s && s.flsaWillful !== undefined) ? s.flsaWillful : true,
        ...s
      };
      // Trial date — default to today if junk.
      scrubDate(out, 'trialDate', todayISO());
      return out;
    });
  }
  if (Array.isArray(c.incidents)) {
    c.incidents.forEach(inc => {
      scrubDate(inc, 'date', todayISO());
      // endDate is meaningfully blank when employment is ongoing — keep blank.
      scrubDate(inc, 'endDate', '');
    });
  }
  if (Array.isArray(c.wagePeriods)) {
    c.wagePeriods.forEach(wp => {
      scrubDate(wp, 'startDate', yearsAgoISO(5));
      // endDate blank = "runs to trial" — keep blank.
      scrubDate(wp, 'endDate', '');
      if (wp.overtimeHoursPerWeek === undefined) wp.overtimeHoursPerWeek = '';
    });
  }
  if (Array.isArray(c.mitigationPeriods)) {
    c.mitigationPeriods.forEach(mp => {
      scrubDate(mp, 'startDate', yearsAgoISO(5));
      // endDate blank = "runs to trial" — keep blank.
      scrubDate(mp, 'endDate', '');
            if(mp.annualBenefits===undefined)mp.annualBenefits=0;
      if(mp.hourlyRate===undefined)mp.hourlyRate='';
      if(mp.hoursPerWeek===undefined)mp.hoursPerWeek='';
      if(mp.overtimeHoursPerWeek===undefined)mp.overtimeHoursPerWeek='';
    });
  }
    if(!c.frontPay)c.frontPay={years:2,projectedWage:'',projectedMitigation:''};
  if (Array.isArray(c.flsaPeriods)) {
    c.flsaPeriods = c.flsaPeriods.map(migrateFlsaPeriod);
    // Rate-change effective dates are reseeded inside migrateFlsaPeriod above.
  }
  if(!c.employerSize)c.employerSize='500+';
  if(!Array.isArray(c.compensatoryItems))c.compensatoryItems=[];
  if(!Array.isArray(c.flsaMinWagePeriods))c.flsaMinWagePeriods=[];
  if(Array.isArray(c.flsaPeriods))c.flsaPeriods.forEach(fp=>{if(!Array.isArray(fp.workweeks))fp.workweeks=[];});
  return c;
}

let STATE = defaultCase();
let currentCaseId = null;
let saveTimeout = null;
let activeTab = 'setup';

// ─────────────────────────────────────────────
// 3. STORAGE  —  Azure Blob Storage + localStorage fallback
// ─────────────────────────────────────────────

// ── Blob config (stored per-browser in localStorage) ──
const BLOB_CFG_KEY = 'wf-blob-cfg';

function getBlobCfg() {
  try { return JSON.parse(localStorage.getItem(BLOB_CFG_KEY)) || null; } catch { return null; }
}
function setBlobCfg(cfg) {
  if (cfg) localStorage.setItem(BLOB_CFG_KEY, JSON.stringify(cfg));
  else localStorage.removeItem(BLOB_CFG_KEY);
}
function blobBase(cfg, blob) {
  const sas = cfg.sasToken.replace(/^\?/,'');
  return `https://${cfg.accountName}.blob.core.windows.net/${cfg.containerName}/${blob}?${sas}`;
}
function blobListUrl(cfg) {
  const sas = cfg.sasToken.replace(/^\?/,'');
  return `https://${cfg.accountName}.blob.core.windows.net/${cfg.containerName}?restype=container&comp=list&${sas}`;
}
function keyToBlob(key) { return key.replace(':', '-') + '.json'; }

// ── Test connection ──
async function testBlobConnection(cfg) {
  try {
    const r = await fetch(blobListUrl(cfg), { method: 'GET' });
    return r.ok || r.status === 200;
  } catch { return false; }
}

// ── Blob operations ──
const blob = {
  async get(key) {
    const cfg = getBlobCfg(); if (!cfg) return null;
    try {
      const r = await fetch(blobBase(cfg, keyToBlob(key)));
      if (r.status === 404) return null;
      if (!r.ok) throw new Error(r.status);
      return await r.json();
    } catch { return null; }
  },
  async set(key, val) {
    const cfg = getBlobCfg(); if (!cfg) throw new Error('No blob config');
    const body = JSON.stringify(val);
    const r = await fetch(blobBase(cfg, keyToBlob(key)), {
      method: 'PUT',
      headers: { 'x-ms-blob-type': 'BlockBlob', 'Content-Type': 'application/json', 'x-ms-blob-content-type': 'application/json' },
      body
    });
    if (!r.ok) throw new Error('Blob write failed: ' + r.status + ' ' + await r.text());
  },
  async delete(key) {
    const cfg = getBlobCfg(); if (!cfg) return;
    try { await fetch(blobBase(cfg, keyToBlob(key)), { method: 'DELETE' }); } catch {}
  }
};

// ── Unified store: blob when configured, localStorage fallback ──
const store = {
  async get(key) {
    if (getBlobCfg()) return blob.get(key);
    try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
  },
  async set(key, val) {
    if (getBlobCfg()) { await blob.set(key, val); return; }
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  async delete(key) {
    if (getBlobCfg()) { await blob.delete(key); return; }
    try { localStorage.removeItem(key); } catch {}
  }
};

// ── Connection status indicator ──
function updateConnectionStatus() {
  const cfg = getBlobCfg();
  const el = document.getElementById('conn-status');
  if (!el) return;
  if (cfg) {
    el.textContent = '☁ ' + cfg.accountName;
    el.style.color = '#7AE09A';
    el.style.borderColor = 'rgba(122,224,154,.3)';
    el.title = 'Connected to Azure Blob Storage\nContainer: ' + cfg.containerName + '\nUser: ' + (cfg.userName||'—');
  } else {
    el.textContent = '⚠ Local only';
    el.style.color = '#f59e0b';
    el.style.borderColor = 'rgba(245,158,11,.3)';
    el.title = 'Cases saved locally only. Configure Azure Blob Storage to share cases across the team.';
  }
}

// ── Blob config modal ──
function openBlobConfigModal() {
  const cfg = getBlobCfg() || {};
  const existing = `
    <div style="background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--navy-2)">
      ☁ <strong>Connected:</strong> ${cfg.accountName} / ${cfg.containerName} &nbsp;·&nbsp; User: ${cfg.userName||'(not set)'}
      <button onclick="disconnectBlob()" style="margin-left:10px;background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px">Disconnect</button>
    </div>`;
  document.getElementById('blob-modal-content').innerHTML = `
    ${cfg.accountName ? existing : ''}
    <div style="display:grid;gap:10px">
      <div><span class="section-label">Storage account name</span>
        <input type="text" id="bi-account" value="${esc(cfg.accountName||'')}" placeholder="workersfrmdamages" autocomplete="off"></div>
      <div><span class="section-label">Container name</span>
        <input type="text" id="bi-container" value="${esc(cfg.containerName||'cases')}" placeholder="cases" autocomplete="off"></div>
      <div><span class="section-label">SAS token (starts with sv= or ?sv=)</span>
        <input type="text" id="bi-sas" value="${esc(cfg.sasToken||'')}" placeholder="sv=2023-08-03&ss=b&srt=co&sp=rwdlac..." autocomplete="off" style="font-size:11px;font-family:monospace"></div>
      <div><span class="section-label">Your name (shown on shared cases)</span>
        <input type="text" id="bi-user" value="${esc(cfg.userName||'')}" placeholder="e.g. Jane Smith" autocomplete="off"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-gold" onclick="saveBlobConfig()">Test & Save Connection</button>
      <button class="btn btn-ghost" onclick="closeBlobConfigModal()">Cancel</button>
    </div>
    <div id="blob-test-result" style="margin-top:10px;font-size:13px"></div>`;
  document.getElementById('blob-config-modal').style.display = 'flex';
}

async function saveBlobConfig() {
  const cfg = {
    accountName: document.getElementById('bi-account').value.trim(),
    containerName: document.getElementById('bi-container').value.trim() || 'cases',
    sasToken: document.getElementById('bi-sas').value.trim(),
    userName: document.getElementById('bi-user').value.trim()
  };
  if (!cfg.accountName || !cfg.sasToken) {
    document.getElementById('blob-test-result').innerHTML = '<span style="color:var(--danger)">⚠ Account name and SAS token are required.</span>';
    return;
  }
  const res = document.getElementById('blob-test-result');
  res.innerHTML = '<span style="color:var(--gray-400)">⏳ Testing connection…</span>';
  const ok = await testBlobConnection(cfg);
  if (ok) {
    setBlobCfg(cfg);
    updateConnectionStatus();
    res.innerHTML = '<span style="color:var(--success)">✓ Connected! Cases will now save to Azure Blob Storage and be shared across your team.</span>';
    setTimeout(()=>{ closeBlobConfigModal(); updateCaseSelect(); }, 1800);
  } else {
    res.innerHTML = '<span style="color:var(--danger)">✗ Connection failed. Check your account name, container name, SAS token, and CORS settings. See the deployment guide for help.</span>';
  }
}

function disconnectBlob() {
  if (!confirm('Disconnect from Azure Blob Storage? Cases will save locally only until reconnected.')) return;
  setBlobCfg(null);
  updateConnectionStatus();
  closeBlobConfigModal();
}
function closeBlobConfigModal() { document.getElementById('blob-config-modal').style.display = 'none'; }

function deriveCaseName(s) {
  const parts = [];
  if (s.caseName) parts.push(s.caseName);
  else {
    if (s.plaintiff) parts.push(s.plaintiff);
    if (s.defendant) parts.push('v. ' + s.defendant);
  }
  return parts.join(' ') || 'Untitled Case';
}

async function saveCurrentCase() {
  STATE.name = deriveCaseName(STATE);
  STATE.savedAt = new Date().toISOString();
  const cfg = getBlobCfg();
  STATE.savedBy = cfg?.userName || 'Local';
  currentCaseId = STATE.id;
  try {
    await store.set('case:'+STATE.id, STATE);
    const idx = await store.get('case-index') || {};
    idx[STATE.id] = {
      id: STATE.id,
      name: STATE.name,
      plaintiff: STATE.plaintiff||'',
      defendant: STATE.defendant||'',
      caseName: STATE.caseName||'',
      attorney: STATE.attorney||'',
      savedAt: STATE.savedAt,
      savedBy: STATE.savedBy
    };
    await store.set('case-index', idx);
    updateSaveIndicator(true);
    updateCaseSelect();
  } catch(e) {
    updateSaveIndicator(false);
    // Show error toast
    showToast('Save failed: ' + e.message, 'error');
  }
}

async function loadCase(id) {
  if (!id) { newCase(); return; }
  const data = await store.get('case:'+id);
  if (!data) return;
  STATE = migrateCase(data);
  currentCaseId = id;
  if (!STATE.scenarios) STATE.scenarios = [{id:uid(),name:'To Trial',trialDate:'',flsaWillful:true}];
  if (!STATE.activeScenarioId) STATE.activeScenarioId = STATE.scenarios[0].id;
  if (!STATE.displayPeriod) STATE.displayPeriod = 'annual';
  updateSaveIndicator(true);
  maybeShowFlsaInterestNotice(data);
  renderTab();
  updateHeaderTotal();
}

// One-time toast for cases that previously had FLSA prejudgment interest baked in.
// Detected by the legacy `regularRate` field on any flsaPeriod.
function maybeShowFlsaInterestNotice(rawData) {
  try {
    const had = Array.isArray(rawData?.flsaPeriods)
      && rawData.flsaPeriods.some(p => p && p.regularRate !== undefined && p.defaultWeeklyHours === undefined);
    if (had) {
      showToast(
        'FLSA prejudgment interest has been removed \u2014 liquidated damages already account for the time-value of money under 29 U.S.C. \u00a7 216(b). Total may differ from prior exports.',
        'warning'
      );
    }
  } catch {}
}

async function loadCaseIndex() {
  return await store.get('case-index') || {};
}

async function updateCaseSelect() {
  const sel = document.getElementById('case-select');
  const idx = await loadCaseIndex();
  sel.innerHTML = '<option value="">— New case (unsaved) —</option>';
  Object.values(idx).sort((a,b)=>b.savedAt?.localeCompare(a.savedAt||'')).forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    if (c.id === currentCaseId) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function deleteCase(id) {
  if (!confirm('Delete this case? This cannot be undone.')) return;
  await store.delete('case:'+id);
  const idx = await store.get('case-index') || {};
  delete idx[id];
  await store.set('case-index', idx);
  if (id === currentCaseId) newCase();
  updateCaseSelect();
  renderCasesList();
}

async function renderCasesList(query='') {
  const idx = await loadCaseIndex();
  const el = document.getElementById('cases-list');
  let cases = Object.values(idx).sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||''));
  // Filter by search query across all searchable fields
  if (query && query.trim()) {
    const q = query.trim().toLowerCase();
    cases = cases.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.plaintiff||'').toLowerCase().includes(q) ||
      (c.defendant||'').toLowerCase().includes(q) ||
      (c.caseName||'').toLowerCase().includes(q) ||
      (c.attorney||'').toLowerCase().includes(q)
    );
  }
  if (!cases.length) {
    el.innerHTML = query
      ? '<div style="text-align:center;padding:24px;color:var(--gray-400)">No cases match your search.</div>'
      : '<div style="text-align:center;padding:24px;color:var(--gray-400)">No saved cases yet.</div>';
    return;
  }
  el.innerHTML = cases.map(c => {
    const isOpen = c.id === currentCaseId;
    const sub = [c.plaintiff, c.defendant ? 'v. '+c.defendant : ''].filter(Boolean).join(' ') || c.caseName || '';
    return `
    <div class="case-list-item" style="${isOpen ? 'border-color:var(--gold-border);background:var(--gold-bg)' : ''}">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="case-list-name" id="name-display-${c.id}">${esc(c.name)}</div>
          ${isOpen ? '<span style="font-size:10px;background:var(--gold);color:var(--navy);border-radius:10px;padding:1px 7px;font-weight:600;flex-shrink:0">Open</span>' : ''}
        </div>
        ${sub && sub !== c.name ? `<div class="case-list-date" style="margin-top:1px">${esc(sub)}</div>` : ''}
        <div class="case-list-date">Saved ${c.savedAt ? new Date(c.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}${c.savedBy && c.savedBy!=='Local' ? ' &nbsp;·&nbsp; <strong>'+esc(c.savedBy)+'</strong>' : ''}</div>
        <!-- Inline rename form (hidden by default) -->
        <div id="rename-form-${c.id}" style="display:none;margin-top:6px;display:none">
          <input type="text" id="rename-input-${c.id}" value="${esc(c.name)}"
            style="width:100%;padding:6px 8px;border:1px solid var(--gold);border-radius:var(--r);font-size:13px"
            onkeydown="if(event.key==='Enter')commitRename('${c.id}');if(event.key==='Escape')cancelRename('${c.id}')">
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="btn btn-gold btn-sm" onclick="commitRename('${c.id}')">Save name</button>
            <button class="btn btn-ghost btn-sm" onclick="cancelRename('${c.id}')">Cancel</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0;align-items:flex-start;margin-left:8px">
        ${isOpen ? '' : `<button class="btn btn-ghost btn-sm" onclick="loadCase('${c.id}');closeCasesModal()">Load</button>`}
        <button class="btn btn-ghost btn-sm" onclick="startRename('${c.id}')" title="Rename">✏</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCase('${c.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function startRename(id) {
  document.getElementById('rename-form-'+id).style.display = 'block';
  document.getElementById('name-display-'+id).style.display = 'none';
  const inp = document.getElementById('rename-input-'+id);
  inp.focus(); inp.select();
}
function cancelRename(id) {
  document.getElementById('rename-form-'+id).style.display = 'none';
  document.getElementById('name-display-'+id).style.display = '';
}
async function commitRename(id) {
  const inp = document.getElementById('rename-input-'+id);
  const newName = inp.value.trim();
  if (!newName) return;
  // Update the index
  const idx = await store.get('case-index') || {};
  if (idx[id]) { idx[id].name = newName; await store.set('case-index', idx); }
  // If this is the currently open case, sync STATE.name too
  if (id === currentCaseId) {
    STATE.name = newName;
    await store.set('case:'+id, STATE);
  } else {
    // Update the stored case name without loading it
    const caseData = await store.get('case:'+id);
    if (caseData) { caseData.name = newName; await store.set('case:'+id, caseData); }
  }
  updateCaseSelect();
  const q = document.getElementById('cases-search')?.value || '';
  renderCasesList(q);
}

function openCasesModal() {
  document.getElementById('cases-modal').style.display='flex';
  const inp = document.getElementById('cases-search');
  if (inp) inp.value = '';
  renderCasesList();
  setTimeout(()=>{ const inp=document.getElementById('cases-search'); if(inp) inp.focus(); }, 80);
}
function closeCasesModal() { document.getElementById('cases-modal').style.display='none'; }

function newCase() {
  STATE = defaultCase();
  currentCaseId = null;
  document.getElementById('case-select').value = '';
  updateSaveIndicator(false);
  renderTab();
  updateHeaderTotal();
}

function updateSaveIndicator(saved) {
  const el = document.getElementById('save-indicator');
  el.textContent = saved ? '●  Saved' : '●  Unsaved changes';
  el.className = 'save-indicator' + (saved ? ' saved' : '');
}

function scheduleSave() {
  updateSaveIndicator(false);
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(()=>{ if(currentCaseId||STATE.caseName||STATE.plaintiff||STATE.defendant) saveCurrentCase(); }, 3000);
}

function esc(s) { return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

function exportJSON() {
  const blob = new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (STATE.caseName||STATE.plaintiff||'damages-case')+'.json';
  a.click();
}

function importJSON(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      STATE = migrateCase(data);
      if(!STATE.scenarios) STATE.scenarios=[{id:uid(),name:'To Trial',trialDate:'',flsaWillful:true}];
      if(!STATE.activeScenarioId) STATE.activeScenarioId=STATE.scenarios[0].id;
      currentCaseId = null;
      maybeShowFlsaInterestNotice(data);
      renderTab(); updateHeaderTotal(); updateSaveIndicator(false);
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  input.value='';
}

// ─────────────────────────────────────────────
// 4. CALCULATIONS
// ─────────────────────────────────────────────
function getQRate(date, custom) {
  const d = new Date(date+'T12:00:00');
  const y=d.getFullYear(), q=Math.floor(d.getMonth()/3)+1;
  const key=`${y}Q${q}`;
  if (custom&&custom[key]!=null&&custom[key]!=='') return Number(custom[key])/100;
  return (DOL_RATES.find(r=>r.y===y&&r.q===q)||{r:7}).r/100;
}

function calcInterest(principal, fromDate, toDate, customRates) {
  if (!fromDate||!toDate||!principal||principal<=0) return 0;
  let total=0, cur=new Date(typeof fromDate==='string'?fromDate+'T12:00:00':fromDate);
  const end=new Date(typeof toDate==='string'?toDate+'T12:00:00':toDate);
  if (cur>=end) return 0;
  while (cur<end) {
    const y=cur.getFullYear(), q=Math.floor(cur.getMonth()/3)+1;
    const nextQ=new Date(y,q*3,1);
    const pEnd=nextQ<end?nextQ:end;
    const days=(pEnd-cur)/86400000;
    total+=principal*getQRate(cur.toISOString().slice(0,10),customRates)*(days/365);
    cur=new Date(pEnd);
  }
  return total;
}

function getDamagePeriods(incidents, trial) {
  const valid = incidents
    .filter(i=>i.date)
    .map(i=>{
      const s=new Date(i.date+'T12:00:00');
      const eRaw = i.endDate ? new Date(i.endDate+'T12:00:00') : trial;
      const e = eRaw < trial ? eRaw : trial;
      return s<e?{start:s,end:e}:null;
    })
    .filter(Boolean)
    .sort((a,b)=>a.start-b.start);
  if (!valid.length) return [];
  const merged=[{...valid[0]}];
  for (let i=1;i<valid.length;i++) {
    const last=merged[merged.length-1];
    if (valid[i].start<=last.end) last.end=new Date(Math.max(last.end,valid[i].end));
    else merged.push({...valid[i]});
  }
  return merged;
}

function daysInDamagePeriods(from, to, periods) {
  let days=0;
  for (const p of periods) {
    const s=Math.max(from.getTime(),p.start.getTime());
    const e=Math.min(to.getTime(),p.end.getTime());
    if (s<e) days+=(e-s)/86400000;
  }
  return days;
}

function getEffectiveAnnual(wp, year, trial) {
  const base = wp.wageType==='hourly'
    ? (parseFloat(wp.hourlyRate)||0)*((parseFloat(wp.hoursPerWeek)||40)+0.5*(parseFloat(wp.overtimeHoursPerWeek)||0))*52
    : (parseFloat(wp.annualSalary)||0);
  const inc = parseFloat(wp.annualIncrease)||0;
  const yrs = Math.max(0, year - new Date(wp.startDate+'T12:00:00').getFullYear());
  const salary = base * Math.pow(1+inc/100, yrs);
  const bonus = wp.bonusType==='percent'
    ? salary*(parseFloat(wp.bonus)||0)/100
    : (parseFloat(wp.bonus)||0);
  const commissionPct = salary*(parseFloat(wp.commissionRate)||0)/100;
  const commissionFixed = parseFloat(wp.commissions)||0;
  return salary+bonus+commissionPct+commissionFixed;
}

function getDailyWage(date, wagePeriods, trial) {
  const sorted=[...wagePeriods].filter(w=>w.startDate).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  let wp=null;
  for (const w of sorted) {
    const ws=new Date(w.startDate+'T12:00:00'), we=w.endDate?new Date(w.endDate+'T12:00:00'):trial;
    if (ws<=date&&we>=date){wp=w;break;}
  }
  if (!wp) for (const w of [...sorted].reverse()) { if(new Date(w.startDate+'T12:00:00')<=date){wp=w;break;} }
  if (!wp) return {daily:0, w2Ben:0};
  const annual = getEffectiveAnnual(wp, date.getFullYear(), trial);
  return {daily:annual/365, w2Ben:parseFloat(wp.employerBenefitsW2)||0};
}

function getTimeUnits(start, end, granularity) {
  const units=[];
  if (granularity==='annual') {
    const sy=start.getFullYear(), ey=end.getFullYear();
    for (let y=sy;y<=ey;y++) {
      units.push({
        start: y===sy?new Date(start):new Date(y,0,1,0,0,1),
        end: y===ey?new Date(end):new Date(y,11,31,23,59,59),
        label: String(y)
      });
    }
  } else if (granularity==='monthly') {
    let cur=new Date(start.getFullYear(),start.getMonth(),1);
    while (cur<end) {
      const ms=cur<start?new Date(start):new Date(cur);
      const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);
      const me=next<end?new Date(next):new Date(end);
      units.push({start:ms,end:me,label:ms.toLocaleDateString('en-US',{month:'short',year:'numeric'})});
      cur=next;
    }
  } else { // weekly
    let cur=new Date(start);
    while (cur<end) {
      const ws=new Date(cur);
      const next=new Date(cur.getTime()+7*86400000);
      const we=next<end?next:new Date(end);
      units.push({start:ws,end:we,label:'Wk of '+ws.toLocaleDateString('en-US',{month:'M/d',day:'numeric'}).replace('M/d','')});
      cur=next;
    }
  }
  return units;
}

function computeDiscrimination(state, trialDate) {
  const trial=new Date(trialDate+'T23:59:59');
  const periods=getDamagePeriods(state.incidents, trial);
  if (!periods.length) return null;
  const bRate=(parseFloat(state.customBenefitsRate)||BLS[state.employerType]||32.5)/100;
  const units=getTimeUnits(periods[0].start, trial, state.displayPeriod);
  let rows=[],totBP=0,totMit=0,totBen=0,totInt=0;
  for (const unit of units) {
    const dd=daysInDamagePeriods(unit.start,unit.end,periods);
    if (dd<=0) continue;
    const {daily,w2Ben}=getDailyWage(unit.start, state.wagePeriods, trial);
    const expWages=daily*dd;
    let mitWages=0,mitBenefits=0;
    for (const mp of state.mitigationPeriods) {
      if (!mp.startDate) continue;
      const ms=new Date(mp.startDate+'T12:00:00');
      const me=mp.endDate?new Date(mp.endDate+'T12:00:00'):trial;
      const os=Math.max(unit.start.getTime(),ms.getTime());
      const oe=Math.min(unit.end.getTime(),me.getTime());
      if (os<oe){mitWages+=(parseFloat(mp.annualWages)||0)/365*((oe-os)/86400000);mitBenefits+=(parseFloat(mp.annualBenefits)||0)/365*((oe-os)/86400000);}
    }
    const netBP=Math.max(0,expWages-mitWages);
    const benefits=state.benefitsMethod==='w2'?w2Ben*(dd/365):netBP*bRate;
    const netBen=Math.max(0,benefits-mitBenefits);
    const mid=new Date((unit.start.getTime()+unit.end.getTime())/2);
    // ADEA: liquidated damages substitute for prejudgment interest. Lorillard v. Pons,
    // 434 U.S. 575, 581 (1978); Powers v. Grinnell Corp., 915 F.2d 34, 41 (1st Cir. 1990).
    const interest = (state.statutoryBasis === 'adea')
      ? 0
      : calcInterest(netBP+benefits, mid.toISOString().slice(0,10), trialDate, state.customRates);
    totBP+=netBP; totMit+=mitWages; totBen+=netBen; totInt+=interest;
    rows.push({label:unit.label,start:unit.start,end:unit.end,dd:Math.round(dd),expWages,mitWages,netBP,benefits:netBen,interest,sub:netBP+netBen+interest});
  }
  const fp=state.frontPay||{};const fpYrs=Math.min(5,Math.max(0,parseFloat(fp.years)||2));const fpW=parseFloat(fp.projectedWage)||0;const fpM=parseFloat(fp.projectedMitigation)||0;const frontPay=Math.max(0,(fpW-fpM)*fpYrs);
  return {rows,totBP,totMit,totBen,totInt,frontPay,discTotal:totBP+totBen+totInt+frontPay};}

// ── FLSA helpers ──
const DOW_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function weekStartOf(dStr, startDow=1) {
  const d = new Date(dStr+'T12:00:00');
  const dow = d.getDay();
  const offset = ((dow - startDow) + 7) % 7;
  d.setDate(d.getDate() - offset);
  return d.toISOString().slice(0,10);
}

function* weeklyIterator(periodStart, periodEnd, startDow=1) {
  if (!periodStart || !periodEnd) return;
  const end = new Date(periodEnd+'T12:00:00');
  const ps  = new Date(periodStart+'T12:00:00');
  if (end < ps) return;
  let cursor = new Date(weekStartOf(periodStart, startDow)+'T12:00:00');
  // Safety cap: hard stop at 520 weeks (10 yrs) to prevent infinite loops on bad data
  let guard = 0;
  while (cursor <= end && guard++ < 520) {
    const wkStart = new Date(cursor);
    const wkEnd   = new Date(cursor); wkEnd.setDate(wkEnd.getDate()+6);
    const overlapStart = wkStart < ps  ? ps  : wkStart;
    const overlapEnd   = wkEnd   > end ? end : wkEnd;
    const days = Math.round((overlapEnd - overlapStart)/86400000) + 1;
    yield {
      weekKey: wkStart.toISOString().slice(0,10),
      daysInPeriod: days,
      isPartial: days < 7
    };
    cursor.setDate(cursor.getDate()+7);
  }
}

function rateForWeek(weekKey, period) {
  const sorted = [...(period.rateChanges||[])]
    .filter(r => r && r.effectiveDate && r.rate !== '' && r.rate != null)
    .sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
  let r = parseFloat(period.defaultRegularRate) || 0;
  for (const change of sorted) {
    if (change.effectiveDate <= weekKey) r = parseFloat(change.rate) || r;
    else break;
  }
  return r;
}

// SOL cutoff date (YYYY-MM-DD) for a given scenario, or '' if no filing date is set.
function flsaCutoff(state, scenario) {
  if (!state || !state.complaintFiledDate) return '';
  const yrs = (scenario && scenario.flsaWillful === false) ? 2 : 3;
  const d = new Date(state.complaintFiledDate+'T12:00:00');
  d.setFullYear(d.getFullYear() - yrs);
  return d.toISOString().slice(0,10);
}

function computeFlsa(state, trialDate) {
  // trialDate is the active scenario's trial date; weeks STARTING after it are dropped.
  const scenario = state.scenarios.find(s => s.id === state.activeScenarioId)
                || state.scenarios[0]
                || {flsaWillful:true};
  const cutoff = flsaCutoff(state, scenario);
  const willful = scenario.flsaWillful !== false;
  const flsaRows = [];
  const weeklyRows = [];
  let totOT = 0, totLiq = 0;

  for (const fp of state.flsaPeriods) {
    if (!fp.startDate || !fp.endDate) continue;
    // Guard against junk persisted dates (e.g. year-0002 from a typo).
    if (!isValidISODate(fp.startDate) || !isValidISODate(fp.endDate)) continue;
    const hasRate = (fp.defaultRegularRate !== '' && fp.defaultRegularRate != null)
                 || (Array.isArray(fp.rateChanges) && fp.rateChanges.some(r => r && r.rate));
    const hasHours = (fp.defaultWeeklyHours !== '' && fp.defaultWeeklyHours != null)
                  || (fp.weekOverrides && Object.keys(fp.weekOverrides).length > 0);
    if (!hasRate || !hasHours) continue;

    const startDow = (typeof fp.workweekStart === 'number') ? fp.workweekStart : 1;
    let pOT=0, pLiq=0, pOtHrs=0, pWeeks=0, pExcluded=0, pSolDropped=0, pPostTrialDropped=0;

    for (const w of weeklyIterator(fp.startDate, fp.endDate, startDow)) {
      // SOL gate (front edge): drop weeks whose start is BEFORE the cutoff
      if (cutoff && w.weekKey < cutoff) {
        weeklyRows.push({
          periodId: fp.id, weekKey: w.weekKey, description: fp.description||'',
          status: 'sol_excluded',
          solReason: willful ? '3-yr SOL' : '2-yr SOL',
          isPartial: w.isPartial, daysInPeriod: w.daysInPeriod
        });
        pSolDropped++; continue;
      }
      // Trial gate (back edge): drop weeks that start AFTER the trial date
      if (trialDate && w.weekKey > trialDate) {
        weeklyRows.push({
          periodId: fp.id, weekKey: w.weekKey, description: fp.description||'',
          status: 'post_trial',
          isPartial: w.isPartial, daysInPeriod: w.daysInPeriod
        });
        pPostTrialDropped++; continue;
      }

      const ov = (fp.weekOverrides||{})[w.weekKey] || {};
      if (ov.excluded) {
        weeklyRows.push({
          periodId: fp.id, weekKey: w.weekKey, description: fp.description||'',
          hours: 0, rate: 0, otMethod: fp.otMethod, otHrs: 0, ot: 0, liq: 0,
          status: 'user_excluded',
          exclusionReason: ov.exclusionReason || 'other',
          isPartial: w.isPartial, daysInPeriod: w.daysInPeriod,
          note: ov.note || ''
        });
        pExcluded++; continue;
      }

      const overrideHours = (ov.hours !== undefined && ov.hours !== '');
      const overrideRate  = (ov.rate  !== undefined && ov.rate  !== '');
      const overrideMeth  = (ov.otMethod !== undefined && ov.otMethod !== '');
      const hours = overrideHours ? (parseFloat(ov.hours)||0) : (parseFloat(fp.defaultWeeklyHours)||0);
      const rate  = overrideRate  ? (parseFloat(ov.rate)||0)  : rateForWeek(w.weekKey, fp);
      const meth  = overrideMeth  ? ov.otMethod : (fp.otMethod || 'half');
      const mult = meth === 'full' ? 1.5 : 0.5;

      // Honest proration for partial weeks
      const threshold = 40 * (w.daysInPeriod / 7);
      const effHours  = hours * (w.daysInPeriod / 7);
      const otHrs = Math.max(0, effHours - threshold);
      const ot = otHrs * rate * mult;
      const liq = ot;

      weeklyRows.push({
        periodId: fp.id, weekKey: w.weekKey, description: fp.description||'',
        hours, rate, otMethod: meth, otHrs, ot, liq,
        status: 'counted',
        overridden: overrideHours || overrideRate || overrideMeth,
        isPartial: w.isPartial, daysInPeriod: w.daysInPeriod,
        note: ov.note || ''
      });
      pOT += ot; pLiq += liq; pOtHrs += otHrs; pWeeks++;
    }

    flsaRows.push({
      ...fp,
      otHrs: pOtHrs, ot: pOT, liq: pLiq, sub: pOT + pLiq, fi: 0,
      weeksCounted: pWeeks, weeksExcluded: pExcluded,
      weeksDroppedBySOL: pSolDropped, weeksDroppedPostTrial: pPostTrialDropped
    });
    totOT += pOT; totLiq += pLiq;
  }

  return {
    flsaRows, weeklyRows,
    totOT, totLiq,
    totFInt: 0,                 // back-compat for any legacy consumer; always 0
    flsaTotal: totOT + totLiq,
    cutoff, willful,
    filingDate: state.complaintFiledDate || ''
  };
}

function computeAll(state) {
  const scenario = state.scenarios.find(s=>s.id===state.activeScenarioId)||state.scenarios[0];
  if (!scenario||!scenario.trialDate) return null;
  const td=scenario.trialDate;
  const includeDisc=state.claimType!=='flsa';
  const includeFlsa=state.claimType!=='discrimination';
  const disc=includeDisc?computeDiscrimination(state,td):null;
  const flsa=includeFlsa?computeFlsa(state,td):null;
  const discTotal=disc?.discTotal||0;
  const flsaTotal=flsa?.flsaTotal||0;
  return {disc,flsa,discTotal,flsaTotal,grand:discTotal+flsaTotal,scenario};
}

// Brand palette — synced with theworkersfirm.com
const XL_NAVY={argb:'FF0F2327'};   // deep teal-black, primary dark
const XL_GOLD={argb:'FFC9A85A'};   // warm accent
const XL_CREAM={argb:'FFF6F7F3'};  // page bg / alt rows
const XL_WHITE={argb:'FFFFFFFF'};
const XL_BORDER_THIN={style:'thin',color:{argb:'FFDCDFDD'}};
const XL_BORDERS={top:XL_BORDER_THIN,left:XL_BORDER_THIN,bottom:XL_BORDER_THIN,right:XL_BORDER_THIN};

function xlStyleHeader(row){
  row.eachCell(c=>{
    c.fill={type:'pattern',pattern:'solid',fgColor:XL_NAVY};
    c.font={bold:true,color:XL_GOLD,size:11};
    c.alignment={vertical:'middle',horizontal:'center',wrapText:true};
    c.border=XL_BORDERS;
  });
  row.height=22;
}
function xlStyleBody(ws,startRow,endRow){
  for(let r=startRow;r<=endRow;r++){
    const row=ws.getRow(r);
    const isAlt=(r-startRow)%2===1;
    row.eachCell(c=>{
      c.fill=isAlt?{type:'pattern',pattern:'solid',fgColor:XL_CREAM}:{type:'pattern',pattern:'solid',fgColor:XL_WHITE};
      c.border=XL_BORDERS;
      c.font={size:10};
      c.alignment={vertical:'middle'};
    });
  }
}
function xlStyleTotals(row){
  row.eachCell(c=>{
    c.fill={type:'pattern',pattern:'solid',fgColor:XL_NAVY};
    c.font={bold:true,color:{argb:'FFFFFFFF'},size:11};
    c.border=XL_BORDERS;
    c.alignment={vertical:'middle'};
  });
  row.height=22;
}
function xlSectionTitle(ws,rowNum,title,colSpan){
  const row=ws.getRow(rowNum);
  row.getCell(1).value=title;
  row.getCell(1).font={bold:true,color:XL_NAVY,size:13};
  row.getCell(1).alignment={vertical:'middle'};
  row.height=26;
  if(colSpan>1) ws.mergeCells(rowNum,1,rowNum,colSpan);
}
function xlNumFmt(ws,cols,startRow,endRow){
  for(let r=startRow;r<=endRow;r++){
    cols.forEach(c=>{
      const cell=ws.getRow(r).getCell(c);
      if(typeof cell.value==='number') cell.numFmt='$#,##0.00';
    });
  }
}

function buildScenarioExcelSheets(wb,res,scenarioName,state){
  const suffix=state.scenarios.length>1?(' — '+scenarioName):'';
  // Summary sheet
  const ws1=wb.addWorksheet('Summary'+suffix);
  ws1.columns=[{width:35},{width:22}];
  ws1.getRow(1).getCell(1).value="The Workers' Firm — Employment Damages Report";
  ws1.getRow(1).getCell(1).font={bold:true,color:XL_NAVY,size:16};
  ws1.mergeCells('A1:B1');
  ws1.getRow(1).height=30;
  const meta=[['Case Name',state.caseName||''],['Plaintiff',state.plaintiff||''],['Defendant',state.defendant||''],['Attorney',state.attorney||''],['Scenario',scenarioName],['Trial Date',res.scenario.trialDate],['Generated',new Date().toLocaleDateString()]];
  meta.forEach((m,i)=>{
    const r=ws1.getRow(3+i);
    r.getCell(1).value=m[0]; r.getCell(1).font={bold:true,color:{argb:'FF69727B'},size:10};
    r.getCell(2).value=m[1]; r.getCell(2).font={size:10};
  });
  let sRow=11;
  xlSectionTitle(ws1,sRow,'SUMMARY',2);
  sRow++;
  const summaryItems=[];
  if(res.disc){
    // ADEA: liquidated damages substitute for prejudgment interest. Lorillard v. Pons,
    // 434 U.S. 575, 581 (1978); Powers v. Grinnell Corp., 915 F.2d 34, 41 (1st Cir. 1990).
    const xNoInt = (state.statutoryBasis === 'adea');
    summaryItems.push(['Back Pay (net)',res.disc.totBP],['Lost Benefits',res.disc.totBen]);
    if (!xNoInt) summaryItems.push(['Prejudgment Interest',res.disc.totInt]);
    summaryItems.push(['Discrimination Subtotal',res.disc.discTotal]);
  }
  if(res.flsa){
    // FLSA: liquidated damages serve in lieu of prejudgment interest (Brooklyn Sav. Bank v. O'Neil) — no separate interest line.
    summaryItems.push(['Unpaid OT Wages',res.flsa.totOT],['Liquidated Damages',res.flsa.totLiq],['FLSA Subtotal',res.flsa.flsaTotal]);
  }
  summaryItems.push(['TOTAL DAMAGES',res.grand]);
  summaryItems.forEach((item,i)=>{
    const r=ws1.getRow(sRow+i);
    r.getCell(1).value=item[0]; r.getCell(1).font={bold:item[0]==='TOTAL DAMAGES',size:10,color:item[0]==='TOTAL DAMAGES'?XL_NAVY:undefined};
    r.getCell(2).value=item[1]; r.getCell(2).numFmt='$#,##0.00'; r.getCell(2).font={bold:item[0]==='TOTAL DAMAGES',size:item[0]==='TOTAL DAMAGES'?13:10,color:item[0]==='TOTAL DAMAGES'?XL_NAVY:undefined};
    r.getCell(1).border=XL_BORDERS; r.getCell(2).border=XL_BORDERS;
    if(i%2===1){r.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:XL_CREAM};r.getCell(2).fill={type:'pattern',pattern:'solid',fgColor:XL_CREAM};}
  });
  if(summaryItems.length){
    const lastRow=ws1.getRow(sRow+summaryItems.length-1);
    lastRow.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:XL_NAVY};
    lastRow.getCell(1).font={bold:true,color:{argb:'FFFFFFFF'},size:12};
    lastRow.getCell(2).fill={type:'pattern',pattern:'solid',fgColor:XL_NAVY};
    lastRow.getCell(2).font={bold:true,color:XL_GOLD,size:14};
  }

  // Back wages sheet
  if(res.disc&&res.disc.rows.length){
    const xNoInt = (state.statutoryBasis === 'adea');
    const ws2=wb.addWorksheet('Back Wages'+suffix);
    const colSpan = xNoInt ? 8 : 9;
    xlSectionTitle(ws2,1,'Estimated Back Wages — '+state.displayPeriod.charAt(0).toUpperCase()+state.displayPeriod.slice(1)+' Breakdown',colSpan);
    const hdr = xNoInt
      ? ['Period','Days','Expected Wages','Mitigation (-)','Net Back Pay','Benefits','Subtotal','Running Total']
      : ['Period','Days','Expected Wages','Mitigation (-)','Net Back Pay','Benefits','Interest','Subtotal','Running Total'];
    const hdrRow=ws2.getRow(3);
    hdr.forEach((h,i)=>{hdrRow.getCell(i+1).value=h;});
    xlStyleHeader(hdrRow);
    let runTotal=0;
    res.disc.rows.forEach((r,i)=>{
      const sub = xNoInt ? (r.netBP + r.benefits) : r.sub;
      runTotal += sub;
      const row=ws2.getRow(4+i);
      const vals = xNoInt
        ? [r.label,r.dd,r.expWages,r.mitWages,r.netBP,r.benefits,sub,runTotal]
        : [r.label,r.dd,r.expWages,r.mitWages,r.netBP,r.benefits,r.interest,sub,runTotal];
      vals.forEach((v,j)=>{row.getCell(j+1).value=v;});
    });
    xlStyleBody(ws2,4,3+res.disc.rows.length);
    const numCols = xNoInt ? [3,4,5,6,7,8] : [3,4,5,6,7,8,9];
    xlNumFmt(ws2,numCols,4,3+res.disc.rows.length);
    const totRow=ws2.getRow(4+res.disc.rows.length);
    const totVals = xNoInt
      ? ['TOTALS','',res.disc.rows.reduce((a,r)=>a+r.expWages,0),res.disc.totMit,res.disc.totBP,res.disc.totBen,res.disc.discTotal,res.disc.discTotal]
      : ['TOTALS','',res.disc.rows.reduce((a,r)=>a+r.expWages,0),res.disc.totMit,res.disc.totBP,res.disc.totBen,res.disc.totInt,res.disc.discTotal,res.disc.discTotal];
    totVals.forEach((v,j)=>{totRow.getCell(j+1).value=v;});
    xlStyleTotals(totRow);
    xlNumFmt(ws2,numCols,4+res.disc.rows.length,4+res.disc.rows.length);
    ws2.columns = xNoInt
      ? [{width:20},{width:8},{width:18},{width:18},{width:18},{width:16},{width:18},{width:18}]
      : [{width:20},{width:8},{width:18},{width:18},{width:18},{width:16},{width:16},{width:18},{width:18}];
  }

  // FLSA period summary sheet
  if(res.flsa&&res.flsa.flsaRows.length){
    const ws3=wb.addWorksheet('FLSA Overtime'+suffix);
    xlSectionTitle(ws3,1,'FLSA Overtime — Period Summary',7);
    const hdr=['Period / Position','Weeks Counted','Excluded','Dropped (SOL/Trial)','OT Hours','OT Wages','Liquidated','Subtotal'];
    const hdrRow=ws3.getRow(3);
    hdr.forEach((h,i)=>{hdrRow.getCell(i+1).value=h;});
    xlStyleHeader(hdrRow);
    res.flsa.flsaRows.forEach((r,i)=>{
      const row=ws3.getRow(4+i);
      const dropped = (r.weeksDroppedBySOL||0)+(r.weeksDroppedPostTrial||0);
      [`${r.startDate} – ${r.endDate||'present'}${r.description?' · '+r.description:''}`,r.weeksCounted||0,r.weeksExcluded||0,dropped,r.otHrs,r.ot,r.liq,r.sub].forEach((v,j)=>{row.getCell(j+1).value=v;});
    });
    xlStyleBody(ws3,4,3+res.flsa.flsaRows.length);
    xlNumFmt(ws3,[5,6,7,8],4,3+res.flsa.flsaRows.length);
    const totRow=ws3.getRow(4+res.flsa.flsaRows.length);
    const totWeeks = res.flsa.flsaRows.reduce((a,r)=>a+(r.weeksCounted||0),0);
    const totExcl = res.flsa.flsaRows.reduce((a,r)=>a+(r.weeksExcluded||0),0);
    const totDrop = res.flsa.flsaRows.reduce((a,r)=>a+(r.weeksDroppedBySOL||0)+(r.weeksDroppedPostTrial||0),0);
    const totHrs  = res.flsa.flsaRows.reduce((a,r)=>a+(r.otHrs||0),0);
    ['FLSA TOTAL',totWeeks,totExcl,totDrop,totHrs,res.flsa.totOT,res.flsa.totLiq,res.flsa.flsaTotal].forEach((v,j)=>{totRow.getCell(j+1).value=v;});
    xlStyleTotals(totRow);
    xlNumFmt(ws3,[5,6,7,8],4+res.flsa.flsaRows.length,4+res.flsa.flsaRows.length);
    ws3.columns=[{width:34},{width:14},{width:12},{width:18},{width:12},{width:16},{width:16},{width:16}];

    // Settings block — workweek + filing date + willfulness
    const sStartRow = 5+res.flsa.flsaRows.length+1;
    xlSectionTitle(ws3,sStartRow,'FLSA Settings',8);
    const settings=[
      ['Complaint filing date', res.flsa.filingDate || '(not set — SOL cap NOT applied)'],
      ['Statute of limitations', res.flsa.willful ? 'Willful — 3 years (29 U.S.C. § 255(a))' : 'Non-willful — 2 years (29 U.S.C. § 255(a))'],
      ['SOL cutoff (earliest counted week)', res.flsa.cutoff || '(none)']
    ];
    state.flsaPeriods.forEach((fp,i)=>{
      const dowName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][typeof fp.workweekStart==='number'?fp.workweekStart:1];
      settings.push([`Workweek begins (Period ${i+1})`, `${dowName} (29 C.F.R. § 778.105)`]);
    });
    settings.forEach((m,i)=>{
      const r=ws3.getRow(sStartRow+1+i);
      r.getCell(1).value=m[0]; r.getCell(1).font={bold:true,color:{argb:'FF69727B'},size:10};
      r.getCell(2).value=m[1]; r.getCell(2).font={size:10};
    });
  }

  // FLSA Weekly Detail sheet — every week the engine considered
  if(res.flsa&&res.flsa.weeklyRows&&res.flsa.weeklyRows.length){
    const ws4=wb.addWorksheet('FLSA Weekly Detail'+suffix);
    xlSectionTitle(ws4,1,'FLSA Overtime — Weekly Breakdown',10);
    const hdr=['Week Of','Position','Status','Days','Hours','Rate ($/hr)','OT Method','OT Hours','OT Wages','Liquidated','Note / Reason'];
    const hdrRow=ws4.getRow(3);
    hdr.forEach((h,i)=>{hdrRow.getCell(i+1).value=h;});
    xlStyleHeader(hdrRow);
    const reasonLabels = {vacation:'Vacation',fmla:'FMLA',sick:'Sick leave',suspension:'Suspension',no_work:'No work',other:'Other'};
    const statusLabels = {counted:'Counted',user_excluded:'Excluded',sol_excluded:'Dropped — SOL',post_trial:'Dropped — post-trial'};
    res.flsa.weeklyRows.forEach((w,i)=>{
      const row=ws4.getRow(4+i);
      const meth = w.otMethod==='full' ? '1.5×' : (w.otMethod==='half' ? '0.5×' : '');
      let note = w.note || '';
      if (w.status==='user_excluded') note = (reasonLabels[w.exclusionReason]||'Excluded')+(note?' — '+note:'');
      else if (w.status==='sol_excluded') note = w.solReason || 'SOL';
      else if (w.status==='post_trial') note = 'After trial date';
      else if (w.isPartial) note = (note?note+' — ':'')+'Partial week (prorated)';
      [w.weekKey, w.description||'', statusLabels[w.status]||w.status, w.daysInPeriod||7, w.hours||0, w.rate||0, meth, w.otHrs||0, w.ot||0, w.liq||0, note].forEach((v,j)=>{row.getCell(j+1).value=v;});
      // Soft row tinting for non-counted statuses
      if (w.status !== 'counted') {
        for (let c=1;c<=11;c++) row.getCell(c).font={size:9,color:{argb:'FF69727B'},italic:true};
      }
    });
    xlStyleBody(ws4,4,3+res.flsa.weeklyRows.length);
    xlNumFmt(ws4,[5,6,8,9,10],4,3+res.flsa.weeklyRows.length);
    ws4.columns=[{width:13},{width:18},{width:18},{width:7},{width:9},{width:11},{width:11},{width:10},{width:14},{width:14},{width:28}];
  }
}

function exportExcel() {
  const res=computeAll(STATE);
  if (!res){alert('Enter required case data first.');return;}
  const wb=new ExcelJS.Workbook();
  wb.creator='The Workers\' Firm';
  buildScenarioExcelSheets(wb,res,res.scenario.name,STATE);
  wb.xlsx.writeBuffer().then(buf=>{
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=(STATE.caseName||STATE.plaintiff||'damages')+'-report.xlsx'; a.click();
    URL.revokeObjectURL(url);
  });
}

function exportAllExcel() {
  const s=STATE;
  const scenarioResults=s.scenarios.map(sc=>{
    if(!sc.trialDate) return null;
    const td=sc.trialDate;
    const includeDisc=s.claimType!=='flsa';
    const includeFlsa=s.claimType!=='discrimination';
    const disc=includeDisc?computeDiscrimination({...s,activeScenarioId:sc.id},td):null;
    const flsa=includeFlsa?computeFlsa(s,td):null;
    const discTotal=disc?.discTotal||0;
    const flsaTotal=flsa?.flsaTotal||0;
    return {disc,flsa,discTotal,flsaTotal,grand:discTotal+flsaTotal,scenario:sc};
  }).filter(Boolean);
  if(!scenarioResults.length){alert('No scenarios with trial dates found.');return;}
  const wb=new ExcelJS.Workbook();
  wb.creator='The Workers\' Firm';
  scenarioResults.forEach(res=>buildScenarioExcelSheets(wb,res,res.scenario.name,s));
  wb.xlsx.writeBuffer().then(buf=>{
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=(s.caseName||s.plaintiff||'damages')+'-all-scenarios.xlsx'; a.click();
    URL.revokeObjectURL(url);
  });
}

function renderTab() {
  const el=document.getElementById('tab-content');
  // Preserve scroll position so users don't get jumped to the top when an
  // in-place control (month toggle, week exclude/reset, rate change, etc.)
  // triggers a full re-render of the tab.
  const prevScroll = el ? el.scrollTop : 0;
  switch(activeTab) {
    case 'setup': el.innerHTML=renderSetup(); break;
    case 'incidents': el.innerHTML=renderIncidents(); break;
    case 'wages': el.innerHTML=renderWages(); break;
    case 'benefits': el.innerHTML=renderBenefits(); break;
    case 'mitigation': el.innerHTML=renderMitigation(); break;
    case 'flsa': el.innerHTML=renderFlsa(); break;
    case 'flsa-minwage': el.innerHTML=renderFlsaMinWage(); break;
    case 'compensatory': el.innerHTML=renderCompensatory(); break;
    case 'rates': el.innerHTML=renderRates(); break;
    case 'results': el.innerHTML=renderResults(); break;
  }
  attachInputListeners();
  updateHeaderTotal();
  updateSidebarDots();
  if (el) {
    const _ps = prevScroll;
    requestAnimationFrame(() => {
      el.scrollTop = _ps;
      if (FLSA_UI.editWeek) {
        const _tr = document.querySelector('[data-week-row="' + FLSA_UI.editWeek.weekKey + '"]');
        if (_tr) { _tr.scrollIntoView({block:'nearest'}); const _hi=_tr.querySelector('input[data-field="hours"]'); if(_hi)_hi.focus(); }
