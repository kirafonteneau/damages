<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Workers' Firm — Employment Damages Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #0D1628;
  --navy-2: #162240;
  --navy-3: #1F3060;
  --gold: #C8A55A;
  --gold-h: #DDB96E;
  --gold-d: #9A7A35;
  --gold-bg: rgba(200,165,90,0.10);
  --gold-border: rgba(200,165,90,0.35);
  --cream: #FAF8F3;
  --white: #FFFFFF;
  --gray-50: #F5F2EA;
  --gray-100: #E8E3D8;
  --gray-200: #CDC7BA;
  --gray-400: #8A8478;
  --gray-600: #4A4840;
  --text: #1A1610;
  --text-2: #5A5650;
  --danger: #B83232;
  --danger-bg: rgba(184,50,50,0.08);
  --success: #2D6E4A;
  --r: 8px;
  --r-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);font-size:14px;line-height:1.5}

/* ── Header ── */
.app-header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;flex-shrink:0;border-bottom:2px solid var(--gold)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:var(--navy)}
.logo-text{font-family:'Playfair Display',serif;font-weight:600;font-size:15px;color:#fff;line-height:1.2}
.logo-sub{font-size:9px;font-weight:400;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;display:block}
.header-right{display:flex;align-items:center;gap:8px}
.save-indicator{font-size:11px;color:var(--gray-200);padding:3px 10px;border:1px solid rgba(255,255,255,.15);border-radius:20px}
.save-indicator.saved{color:#7AE09A;border-color:rgba(122,224,154,.3)}

/* ── Case bar ── */
.case-bar{background:var(--white);border-bottom:1px solid var(--gray-100);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.case-select{font-size:13px;font-weight:500;padding:6px 10px;border:1px solid var(--gray-100);border-radius:var(--r);background:#fff;cursor:pointer;min-width:220px}
.case-bar-total{margin-left:auto;text-align:right}
.case-bar-total-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400)}
.case-bar-total-value{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--gold-d)}

/* ── Layout ── */
.app-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.main-area{display:flex;flex:1;overflow:hidden}
.tab-sidebar{width:168px;flex-shrink:0;background:var(--navy-2);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.tab-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:12.5px;font-weight:400;color:rgba(255,255,255,.55);border:none;background:none;text-align:left;width:100%;transition:all .15s;border-left:3px solid transparent}
.tab-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.tab-btn.active{color:#fff;background:rgba(200,165,90,.12);border-left-color:var(--gold);font-weight:500}
.tab-btn .t-icon{font-size:14px;opacity:.7}
.tab-section-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:16px 16px 6px}
.tab-content{flex:1;overflow-y:auto;padding:20px}

/* ── Cards ── */
.card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--navy);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--gray-400);margin-bottom:14px}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:4px;display:block}
.info-box{background:var(--gold-bg);border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;font-size:12.5px;color:var(--navy-2);margin-bottom:14px;line-height:1.6}
.danger-box{background:var(--danger-bg);border-left:3px solid var(--danger);padding:10px 14px;border-radius:0 var(--r) var(--r) 0;font-size:12px;color:var(--danger);margin-bottom:14px}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.col-span-2{grid-column:span 2}
.col-span-3{grid-column:span 3}

/* ── Inputs ── */
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;border:1px solid var(--gray-100);border-radius:var(--r);padding:8px 10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:#fff;transition:border-color .15s
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
input[type=radio],input[type=checkbox]{width:auto}
input::placeholder{color:var(--gray-200)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600}
.btn-gold:hover{background:var(--gold-h)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-2)}
.btn-ghost{background:none;border:1px solid var(--gray-100);color:var(--text-2)}
.btn-ghost:hover{border-color:var(--gray-200);background:var(--gray-50)}
.btn-danger{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-add{width:100%;border:1.5px dashed var(--gray-200);background:none;border-radius:var(--r);padding:9px;color:var(--gray-400);cursor:pointer;font-size:13px;margin-top:8px;transition:all .15s}
.btn-add:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-remove{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.btn-remove:hover{color:var(--danger);background:var(--danger-bg)}

/* ── Incident cards ── */
.incident-card{border:1px solid var(--gray-100);border-radius:var(--r);padding:14px;margin-bottom:10px;position:relative}
.incident-card.has-end{border-color:var(--gold-border);background:linear-gradient(135deg,#fff,#FDFBF5)}

/* ── Metric cards ── */
.metric-card{background:var(--gray-50);border-radius:var(--r);padding:12px 14px}
.metric-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.metric-value{font-size:19px;font-weight:500;color:var(--text)}
.metric-value.gold{color:var(--gold-d)}
.metric-sub{font-size:11px;color:var(--gray-400);margin-top:2px}

/* ── Total banner ── */
.total-banner{background:var(--navy);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.total-banner-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.total-banner-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}
.total-banner-amount{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:var(--gold)}

/* ── Tables ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);border-bottom:1.5px solid var(--gray-100);white-space:nowrap}
thead th.r{text-align:right}
tbody td{padding:8px 10px;border-bottom:1px solid var(--gray-50)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--gray-50)}
td.r{text-align:right}
td.bold{font-weight:500}
td.gold{color:var(--gold-d);font-weight:500}
tfoot td{padding:10px 10px;font-weight:600;background:var(--navy);color:#fff;border-top:2px solid var(--navy-3)}
tfoot td.gold{color:var(--gold)}

/* ── Scenario tabs ── */
.scenario-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--gray-50);border-radius:var(--r);padding:3px}
.scenario-tab{flex:1;padding:7px 14px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:400;color:var(--gray-400);transition:all .15s;text-align:center}
.scenario-tab.active{background:#fff;color:var(--navy);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── Period toggle ── */
.period-toggle{display:inline-flex;border:1px solid var(--gray-100);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.period-btn{padding:6px 14px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--gray-400);font-weight:400;transition:all .15s}
.period-btn.active{background:var(--navy);color:#fff;font-weight:500}

/* ── Radio cards ── */
.radio-card{display:flex;gap:10px;padding:12px 14px;border:1px solid var(--gray-100);border-radius:var(--r);cursor:pointer;transition:all .15s;align-items:flex-start}
.radio-card.selected{border-color:var(--gold);background:var(--gold-bg)}
.radio-card-label{font-size:13px;font-weight:500;color:var(--navy)}
.radio-card-desc{font-size:11.5px;color:var(--gray-400);margin-top:2px}

/* ── Case modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:var(--r-lg);padding:24px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--navy);margin-bottom:4px}
.modal-sub{font-size:12.5px;color:var(--gray-400);margin-bottom:18px}
.case-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--gray-100);border-radius:var(--r);margin-bottom:8px;transition:all .15s}
.case-list-item:hover{border-color:var(--gold-border);background:var(--gold-bg)}
.case-list-name{font-size:13px;font-weight:500;flex:1}
.case-list-date{font-size:11px;color:var(--gray-400)}

/* ── Disclaimer ── */
.disclaimer{background:var(--gray-50);border-radius:var(--r);padding:12px 14px;font-size:11px;color:var(--gray-400);line-height:1.7;margin-top:10px}

/* ── DOL rate grid ── */
.rate-cell{background:var(--gray-50);border-radius:var(--r);padding:10px;border:1px solid var(--gray-100)}
.rate-cell.custom{border-color:var(--gold-border);background:var(--gold-bg)}
.rate-cell input{border:none;background:transparent;font-size:15px;font-weight:500;color:var(--text);width:48px;padding:0;outline:none}
.rate-cell input:focus{color:var(--gold-d)}

/* ── Wage type toggle ── */
.wage-type-toggle{display:inline-flex;border:1px solid var(--gray-100);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.wage-type-btn{padding:6px 12px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--gray-400)}
.wage-type-btn.active{background:var(--navy);color:#fff}

/* ── Export bar ── */
.export-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:3px}
</style>
</head>
<body>
<div class="app-wrap">
  <!-- Header -->
  <div class="app-header">
    <div class="logo">
      <div class="logo-mark">W</div>
      <div class="logo-text">The Workers' Firm<span class="logo-sub">Employment Damages Calculator</span></div>
    </div>
    <div class="header-right">
      <span class="save-indicator" id="save-indicator">●  Not saved</span>
      <span class="save-indicator" id="conn-status" onclick="openBlobConfigModal()" style="cursor:pointer" title="Click to configure Azure Blob Storage">⚠ Local only</span>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)" onclick="openBlobConfigModal()" title="Configure shared storage">☁ Storage</button>
      <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)" onclick="openCasesModal()">⊞ Cases</button>
      <button class="btn btn-gold btn-sm" onclick="saveCurrentCase()">Save</button>
    </div>
  </div>

  <!-- Case / scenario bar -->
  <div class="case-bar">
    <select class="case-select" id="case-select" onchange="loadCase(this.value)" title="Currently open case">
      <option value="">— New case (unsaved) —</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="newCase()">+ New case</button>
    <div style="display:flex;gap:6px;margin-left:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportJSON()">⬇ JSON</button>
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Import <input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
    </div>
    <div class="case-bar-total" id="header-total" style="display:none">
      <div class="case-bar-total-label">Total damages</div>
      <div class="case-bar-total-value" id="header-total-value">—</div>
    </div>
  </div>

  <div class="main-area">
    <!-- Sidebar tabs -->
    <div class="tab-sidebar">
      <div class="tab-section-label">Case</div>
      <button class="tab-btn active" onclick="showTab('setup')" id="tab-setup">
        <span class="t-icon">⚖</span> Setup
      </button>
      <button class="tab-btn" onclick="showTab('incidents')" id="tab-incidents">
        <span class="t-icon">📅</span> Incidents
      </button>
      <div class="tab-section-label">Wages</div>
      <button class="tab-btn" onclick="showTab('wages')" id="tab-wages">
        <span class="t-icon">💰</span> Back Wages
      </button>
      <button class="tab-btn" onclick="showTab('benefits')" id="tab-benefits">
        <span class="t-icon">🏥</span> Benefits
      </button>
      <button class="tab-btn" onclick="showTab('mitigation')" id="tab-mitigation">
        <span class="t-icon">↔</span> Mitigation
      </button>
      <div class="tab-section-label">FLSA</div>
      <button class="tab-btn" onclick="showTab('flsa')" id="tab-flsa">
        <span class="t-icon">⏱</span> Overtime
      </button>
      <div class="tab-section-label">Settings</div>
      <button class="tab-btn" onclick="showTab('rates')" id="tab-rates">
        <span class="t-icon">📊</span> DOL Rates
      </button>
      <button class="tab-btn" onclick="showTab('results')" id="tab-results">
        <span class="t-icon">✦</span> Results
      </button>
    </div>

    <!-- Content area -->
    <div class="tab-content" id="tab-content"></div>
  </div>
</div>

<!-- Cases modal -->
<div class="modal-overlay" id="cases-modal" style="display:none">
  <div class="modal" style="width:640px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div class="modal-title">Saved Cases</div>
        <div class="modal-sub">Search, load, rename, or delete saved cases.</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeCasesModal()">✕ Close</button>
    </div>
    <!-- Search bar -->
    <div style="position:relative;margin-bottom:12px">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400);font-size:14px">🔍</span>
      <input type="text" id="cases-search" placeholder="Search by case name, plaintiff, defendant, or attorney…"
        oninput="renderCasesList(this.value)"
        style="width:100%;padding:9px 12px 9px 32px;border:1px solid var(--gray-100);border-radius:var(--r);font-size:13px">
    </div>
    <div id="cases-list"></div>
    <button class="btn btn-gold" style="width:100%;margin-top:10px" onclick="newCase();closeCasesModal()">+ Create New Case</button>
  </div>
</div>

<!-- Blob Storage config modal -->
<div class="modal-overlay" id="blob-config-modal" style="display:none">
  <div class="modal" style="width:580px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div class="modal-title">☁ Azure Blob Storage</div>
        <div class="modal-sub">Connect to shared storage so all team members see the same cases.</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeBlobConfigModal()">✕ Close</button>
    </div>
    <div id="blob-modal-content"></div>
  </div>
</div>

<!-- Toast notifications -->
<div id="toast" style="position:fixed;bottom:24px;right:24px;z-index:999;display:none;
  padding:12px 18px;border-radius:var(--r);font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:340px;line-height:1.5"></div>

<script>
// ─────────────────────────────────────────────
// 1. CONSTANTS
// ─────────────────────────────────────────────
const DOL_RATES = [
  {y:2018,q:1,r:4},{y:2018,q:2,r:5},{y:2018,q:3,r:5},{y:2018,q:4,r:5},
  {y:2019,q:1,r:6},{y:2019,q:2,r:6},{y:2019,q:3,r:5},{y:2019,q:4,r:5},
  {y:2020,q:1,r:5},{y:2020,q:2,r:3},{y:2020,q:3,r:3},{y:2020,q:4,r:3},
  {y:2021,q:1,r:3},{y:2021,q:2,r:3},{y:2021,q:3,r:3},{y:2021,q:4,r:3},
  {y:2022,q:1,r:3},{y:2022,q:2,r:4},{y:2022,q:3,r:6},{y:2022,q:4,r:6},
  {y:2023,q:1,r:7},{y:2023,q:2,r:7},{y:2023,q:3,r:7},{y:2023,q:4,r:8},
  {y:2024,q:1,r:8},{y:2024,q:2,r:8},{y:2024,q:3,r:8},{y:2024,q:4,r:8},
  {y:2025,q:1,r:7},{y:2025,q:2,r:7},{y:2025,q:3,r:7},{y:2025,q:4,r:7},
  {y:2026,q:1,r:7},{y:2026,q:2,r:7},
];
// BLS ECEC benefits rates — supplementary (voluntary) benefits only
// Excludes legally-required costs (SS/Medicare, FUTA, workers comp) which are not "lost benefits"
// Source: BLS ECEC Table 1, Q4 2024 (USDL-25-0379, Mar. 2025)
// Total benefits % of wages:  private 43.7%, state_local 61.0%, federal 71.0%
// Legally-required % of wages: private ~11.2%, state_local ~12.1%, federal ~11.7%
// Supplementary (applied):    private 32.5%, state_local 48.9%, federal 59.3%
const BLS = {private:32.5,state_local:48.9,federal:59.3};
const BLS_TOTAL = {private:43.7,state_local:61.0,federal:71.0};
const BLS_L = {private:'Private sector',state_local:'State / Local govt',federal:'Federal govt'};
const INC_TYPES = [
  {v:'termination',l:'Termination'},
  {v:'suspension',l:'Suspension (fixed period)'},
  {v:'demotion',l:'Demotion / Pay cut'},
  {v:'constructive',l:'Constructive discharge'},
  {v:'failure_hire',l:'Failure to hire'},
  {v:'failure_promote',l:'Failure to promote'},
  {v:'other',l:'Other adverse action'},
];

const uid = () => Math.random().toString(36).slice(2,9);
const $$ = n => n==null?'—':new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n);
const pct = n => n==null?'—':`${Number(n).toFixed(1)}%`;
const dt = d => {try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}};

// ─────────────────────────────────────────────
// 2. STATE
// ─────────────────────────────────────────────
function defaultCase(name='New Case') {
  const sid = uid();
  return {
    id: uid(),
    name,
    savedAt: null,
    caseName:'', plaintiff:'', defendant:'', attorney:'',
    employerType:'private', claimType:'both',
    benefitsMethod:'estimate', customBenefitsRate:'',
    scenarios:[{id:sid, name:'To Trial', trialDate:''}],
    activeScenarioId: sid,
    displayPeriod:'annual',
    incidents:[{id:uid(), date:'', endDate:'', type:'termination', description:''}],
    wagePeriods:[{id:uid(), startDate:'', endDate:'', wageType:'annual',
      annualSalary:'', hourlyRate:'', hoursPerWeek:'40', annualIncrease:'0',
      source:'paystub', bonus:'', bonusType:'fixed', commissionRate:'', commissions:'', employerBenefitsW2:''}],
    mitigationPeriods:[{id:uid(), startDate:'', endDate:'', annualWages:'', employer:'', notes:''}],
    flsaPeriods:[{id:uid(), startDate:'', endDate:'', regularRate:'', weeklyHours:'', weeksWorked:'', description:'', otMethod:'half'}],
    customRates:{}
  };
}

// ── Blob config (stored per-browser in localStorage) ──
const BLOB_CFG_KEY = 'wf-blob-cfg';

function getBlobCfg() {
  try { return JSON.parse(localStorage.getItem(BLOB_CFG_KEY)) || null; } catch { return null; }
}
function setBlobCfg(cfg) {
  if (cfg) localStorage.setItem(BLOB_CFG_KEY, JSON.stringify(cfg));
  else localStorage.removeItem(BLOB_CFG_KEY);
}
function blobBase(cfg, blob) {
  const sas = cfg.sasToken.replace(/^\?/,'');
  return `https://${cfg.accountName}.blob.core.windows.net/${cfg.containerName}/${blob}?${sas}`;
}
function blobListUrl(cfg) {
  const sas = cfg.sasToken.replace(/^\?/,'');
  return `https://${cfg.accountName}.blob.core.windows.net/${cfg.containerName}?restype=container&comp=list&${sas}`;
}
function keyToBlob(key) { return key.replace(':', '-') + '.json'; }

// ── Test connection ──
async function testBlobConnection(cfg) {
  try {
    const r = await fetch(blobListUrl(cfg), { method: 'GET' });
    return r.ok || r.status === 200;
  } catch { return false; }
}

// ── Blob operations ──
const blob = {
  async get(key) {
    const cfg = getBlobCfg(); if (!cfg) return null;
    try {
      const r = await fetch(blobBase(cfg, keyToBlob(key)));
      if (r.status === 404) return null;
      if (!r.ok) throw new Error(r.status);
      return await r.json();
    } catch { return null; }
  },
  async set(key, val) {
    const cfg = getBlobCfg(); if (!cfg) throw new Error('No blob config');
    const body = JSON.stringify(val);
    const r = await fetch(blobBase(cfg, keyToBlob(key)), {
      method: 'PUT',
      headers: { 'x-ms-blob-type': 'BlockBlob', 'Content-Type': 'application/json', 'x-ms-blob-content-type': 'application/json' },
      body
    });
    if (!r.ok) throw new Error('Blob write failed: ' + r.status + ' ' + await r.text());
  },
  async delete(key) {
    const cfg = getBlobCfg(); if (!cfg) return;
    try { await fetch(blobBase(cfg, keyToBlob(key)), { method: 'DELETE' }); } catch {}
  }
};

// ── Unified store: blob when configured, localStorage fallback ──
const store = {
  async get(key) {
    if (getBlobCfg()) return blob.get(key);
    try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
  },
  async set(key, val) {
    if (getBlobCfg()) { await blob.set(key, val); return; }
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  async delete(key) {
    if (getBlobCfg()) { await blob.delete(key); return; }
    try { localStorage.removeItem(key); } catch {}
  }
};

// ── Connection status indicator ──
function updateConnectionStatus() {
  const cfg = getBlobCfg();
  const el = document.getElementById('conn-status');

    el.style.color = '#7AE09A';
    el.style.borderColor = 'rgba(122,224,154,.3)';
    el.title = 'Connected to Azure Blob Storage\nContainer: ' + cfg.containerName + '\nUser: ' + (cfg.userName||'—');
  } else {

    el.style.color = '#f59e0b';
    el.style.borderColor = 'rgba(245,158,11,.3)';

function deriveCaseName(s) {
  const parts = [];
  if (s.caseName) parts.push(s.caseName);
  else {
    if (s.plaintiff) parts.push(s.plaintiff);
    if (s.defendant) parts.push('v. ' + s.defendant);
  }
  return parts.join(' ') || 'Untitled Case';
}

async function saveCurrentCase() {
  STATE.name = deriveCaseName(STATE);
  STATE.savedAt = new Date().toISOString();
  const cfg = getBlobCfg();
  STATE.savedBy = cfg?.userName || 'Local';
  currentCaseId = STATE.id;
  try {
    await store.set('case:'+STATE.id, STATE);
    const idx = await store.get('case-index') || {};
    idx[STATE.id] = {
      id: STATE.id,
      name: STATE.name,
      plaintiff: STATE.plaintiff||'',
      defendant: STATE.defendant||'',
      caseName: STATE.caseName||'',
      attorney: STATE.attorney||'',
      savedAt: STATE.savedAt,
      savedBy: STATE.savedBy
    };
    await store.set('case-index', idx);
    updateSaveIndicator(true);
    updateCaseSelect();
  } catch(e) {
    updateSaveIndicator(false);
    // Show error toast
    showToast('Save failed: ' + e.message, 'error');
  }
}

  if (!id) { newCase(); return; }
  const data = await store.get('case:'+id);

  STATE = data;
  currentCaseId = id;
  if (!STATE.scenarios) STATE.scenarios = [{id:uid(),name:'To Trial',trialDate:''}];
  if (!STATE.activeScenarioId) STATE.activeScenarioId = STATE.scenarios[0].id;

async function deleteCase(id) {

// ─────────────────────────────────────────────
// 4. CALCULATIONS
// ─────────────────────────────────────────────
function getQRate(date, custom) {
  const d = new Date(date+'T12:00:00');
  const y=d.getFullYear(), q=Math.floor(d.getMonth()/3)+1;
  const key=`${y}Q${q}`;
  if (custom&&custom[key]!=null&&custom[key]!=='') return Number(custom[key])/100;
  return (DOL_RATES.find(r=>r.y===y&&r.q===q)||{r:7}).r/100;
}

function calcInterest(principal, fromDate, toDate, customRates) {
  if (!fromDate||!toDate||!principal||principal<=0) return 0;
  let total=0, cur=new Date(typeof fromDate==='string'?fromDate+'T12:00:00':fromDate);
  const end=new Date(typeof toDate==='string'?toDate+'T12:00:00':toDate);
  if (cur>=end) return 0;
  while (cur<end) {
    const y=cur.getFullYear(), q=Math.floor(cur.getMonth()/3)+1;
    const nextQ=new Date(y,q*3,1);
    const pEnd=nextQ<end?nextQ:end;
    const days=(pEnd-cur)/86400000;
    total+=principal*getQRate(cur.toISOString().slice(0,10),customRates)*(days/365);
    cur=new Date(pEnd);
  }
  return total;
}

function getDamagePeriods(incidents, trial) {
  const valid = incidents
    .filter(i=>i.date)
    .map(i=>{
      const s=new Date(i.date+'T12:00:00');
      const eRaw = i.endDate ? new Date(i.endDate+'T12:00:00') : trial;
      const e = eRaw < trial ? eRaw : trial;
      return s<e?{start:s,end:e}:null;
    })
    .filter(Boolean)
    .sort((a,b)=>a.start-b.start);
  if (!valid.length) return [];
  const merged=[{...valid[0]}];
  for (let i=1;i<valid.length;i++) {
    const last=merged[merged.length-1];
    if (valid[i].start<=last.end) last.end=new Date(Math.max(last.end,valid[i].end));
    else merged.push({...valid[i]});
  }
  return merged;
}

function daysInDamagePeriods(from, to, periods) {
  let days=0;
  for (const p of periods) {
    const s=Math.max(from.getTime(),p.start.getTime());
    const e=Math.min(to.getTime(),p.end.getTime());
    if (s<e) days+=(e-s)/86400000;
  }
  return days;
}

function getEffectiveAnnual(wp, year, trial) {
  const base = wp.wageType==='hourly'
    ? (parseFloat(wp.hourlyRate)||0)*(parseFloat(wp.hoursPerWeek)||40)*52
    : (parseFloat(wp.annualSalary)||0);
  const inc = parseFloat(wp.annualIncrease)||0;
  const yrs = Math.max(0, year - new Date(wp.startDate+'T12:00:00').getFullYear());
  const salary = base * Math.pow(1+inc/100, yrs);
  const bonus = wp.bonusType==='percent'
    ? salary*(parseFloat(wp.bonus)||0)/100
    : (parseFloat(wp.bonus)||0);
  const commissionPct = salary*(parseFloat(wp.commissionRate)||0)/100;
  const commissionFixed = parseFloat(wp.commissions)||0;
  return salary+bonus+commissionPct+commissionFixed;
}

function getDailyWage(date, wagePeriods, trial) {
  const sorted=[...wagePeriods].filter(w=>w.startDate).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  let wp=null;
  for (const w of sorted) {
    const ws=new Date(w.startDate+'T12:00:00'), we=w.endDate?new Date(w.endDate+'T12:00:00'):trial;
    if (ws<=date&&we>=date){wp=w;break;}
  }
  if (!wp) for (const w of [...sorted].reverse()) { if(new Date(w.startDate+'T12:00:00')<=date){wp=w;break;} }
  if (!wp) return {daily:0, w2Ben:0};
  const annual = getEffectiveAnnual(wp, date.getFullYear(), trial);
  return {daily:annual/365, w2Ben:parseFloat(wp.employerBenefitsW2)||0};
}

function getTimeUnits(start, end, granularity) {
  const units=[];
  if (granularity==='annual') {
    const sy=start.getFullYear(), ey=end.getFullYear();
    for (let y=sy;y<=ey;y++) {
      units.push({
        start: y===sy?new Date(start):new Date(y,0,1,0,0,1),
        end: y===ey?new Date(end):new Date(y,11,31,23,59,59),
        label: String(y)
      });
    }
  } else if (granularity==='monthly') {
    let cur=new Date(start.getFullYear(),start.getMonth(),1);
    while (cur<end) {
      const ms=cur<start?new Date(start):new Date(cur);
      const next=new Date(cur.getFullYear(),cur.getMonth()+1,1);
      const me=next<end?new Date(next):new Date(end);
      units.push({start:ms,end:me,label:ms.toLocaleDateString('en-US',{month:'short',year:'numeric'})});
      cur=next;
    }
  } else { // weekly
    let cur=new Date(start);
    while (cur<end) {
      const ws=new Date(cur);
      const next=new Date(cur.getTime()+7*86400000);
      const we=next<end?next:new Date(end);
      units.push({start:ws,end:we,label:'Wk of '+ws.toLocaleDateString('en-US',{month:'M/d',day:'numeric'}).replace('M/d','')});
      cur=next;
    }
  }
  return units;
}

function computeDiscrimination(state, trialDate) {
  const trial=new Date(trialDate+'T23:59:59');
  const periods=getDamagePeriods(state.incidents, trial);
  if (!periods.length) return null;
  const bRate=(parseFloat(state.customBenefitsRate)||BLS[state.employerType]||32.5)/100;
  const units=getTimeUnits(periods[0].start, trial, state.displayPeriod);
  let rows=[],totBP=0,totMit=0,totBen=0,totInt=0;
  for (const unit of units) {
    const dd=daysInDamagePeriods(unit.start,unit.end,periods);
    if (dd<=0) continue;
    const {daily,w2Ben}=getDailyWage(unit.start, state.wagePeriods, trial);
    const expWages=daily*dd;
    let mitWages=0;
    for (const mp of state.mitigationPeriods) {
      if (!mp.startDate||!mp.annualWages) continue;
      const ms=new Date(mp.startDate+'T12:00:00');
      const me=mp.endDate?new Date(mp.endDate+'T12:00:00'):trial;
      const os=Math.max(unit.start.getTime(),ms.getTime());
      const oe=Math.min(unit.end.getTime(),me.getTime());
      if (os<oe) mitWages+=(parseFloat(mp.annualWages)||0)/365*((oe-os)/86400000);
    }
    const netBP=Math.max(0,expWages-mitWages);
    const benefits=state.benefitsMethod==='w2'?w2Ben*(dd/365):netBP*bRate;
    const mid=new Date((unit.start.getTime()+unit.end.getTime())/2);
    const interest=calcInterest(netBP+benefits, mid.toISOString().slice(0,10), trialDate, state.customRates);
    totBP+=netBP; totMit+=mitWages; totBen+=benefits; totInt+=interest;
    rows.push({label:unit.label,start:unit.start,end:unit.end,dd:Math.round(dd),expWages,mitWages,netBP,benefits,interest,sub:netBP+benefits+interest});
  }
  return {rows,totBP,totMit,totBen,totInt,discTotal:totBP+totBen+totInt};
}

function computeFlsa(state, trialDate) {
  let flsaRows=[],totOT=0,totLiq=0,totFInt=0;
  for (const fp of state.flsaPeriods) {
    if (!fp.startDate||!fp.regularRate||!fp.weeklyHours||!fp.weeksWorked) continue;
    const rate=parseFloat(fp.regularRate)||0;
    const wkHrs=parseFloat(fp.weeklyHours)||0;
    const wks=parseFloat(fp.weeksWorked)||0;
    const mult=fp.otMethod==='full'?1.5:0.5;
    const otHrs=Math.max(0,wkHrs-40)*wks;
    const ot=otHrs*rate*mult;
    const liq=ot;
    const fi=calcInterest(ot, fp.startDate, trialDate, state.customRates);
    totOT+=ot; totLiq+=liq; totFInt+=fi;
    flsaRows.push({...fp,otHrs,ot,liq,fi,sub:ot+liq+fi});
  }
  return {flsaRows,totOT,totLiq,totFInt,flsaTotal:totOT+totLiq+totFInt};
}

function computeAll(state) {
  const scenario = state.scenarios.find(s=>s.id===state.activeScenarioId)||state.scenarios[0];
  if (!scenario||!scenario.trialDate) return null;
  const td=scenario.trialDate;
  const includeDisc=state.claimType!=='flsa';
  const includeFlsa=state.claimType!=='discrimination';
  const disc=includeDisc?computeDiscrimination(state,td):null;
  const flsa=includeFlsa?computeFlsa(state,td):null;
  const discTotal=disc?.discTotal||0;
  const flsaTotal=flsa?.flsaTotal||0;
  return {disc,flsa,discTotal,flsaTotal,grand:discTotal+flsaTotal,scenario};
}

function showTab(name) {
  activeTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tab-'+name);
  if (btn) btn.classList.add('active');
  renderTab();
}

function renderTab() {
  const el=document.getElementById('tab-content');
  switch(activeTab) {
    case 'setup': el.innerHTML=renderSetup(); break;
    case 'incidents': el.innerHTML=renderIncidents(); break;
    case 'wages': el.innerHTML=renderWages(); break;
    case 'benefits': el.innerHTML=renderBenefits(); break;
    case 'mitigation': el.innerHTML=renderMitigation(); break;
    case 'flsa': el.innerHTML=renderFlsa(); break;
    case 'rates': el.innerHTML=renderRates(); break;
    case 'results': el.innerHTML=renderResults(); break;
  }
  attachInputListeners();
  updateHeaderTotal();
}

function attachInputListeners() {
  document.querySelectorAll('#tab-content input, #tab-content select, #tab-content textarea').forEach(el=>{
    el.addEventListener('change',handleChange);
    if (el.tagName==='INPUT'&&el.type!=='radio'&&el.type!=='checkbox') el.addEventListener('input',handleChange);
  });
}

function handleChange(e) {
  const el=e.target;
  const key=el.dataset.key;
  const idx=el.dataset.idx!==undefined?Number(el.dataset.idx):null;
  const list=el.dataset.list;
  const field=el.dataset.field;
  const val=el.type==='checkbox'?el.checked:el.value;
  if (list&&field&&idx!==null) {
    STATE[list][idx][field]=val;
  } else if (key) {
    setNested(STATE,key,val);
  }
  // Re-render if structural change needed
  if (el.dataset.rerender==='1') renderTab();
  else {
    updateHeaderTotal();
    scheduleSave();
    // Keep the case dropdown label in sync as user types case/plaintiff name
    if (key && ['caseName','plaintiff','defendant'].includes(key)) {
      const derived = deriveCaseName(STATE);
      const sel = document.getElementById('case-select');
      if (sel && currentCaseId) {
        const opt = sel.querySelector(`option[value="${currentCaseId}"]`);
        if (opt) opt.textContent = derived;
      }
    }
  }
}

function setNested(obj,key,val) {
  const parts=key.split('.');
  let cur=obj;
  for (let i=0;i<parts.length-1;i++) cur=cur[parts[i]];
  cur[parts[parts.length-1]]=val;
}

function updateHeaderTotal() {
  const res=computeAll(STATE);
  const el=document.getElementById('header-total');
  const valEl=document.getElementById('header-total-value');
  if (res) { el.style.display='block'; valEl.textContent=$$(res.grand); }
  else { el.style.display='none'; }
  scheduleSave();
}

function field(label, inp, opts={}) {
  return `<div style="${opts.style||''}">
    <span class="section-label">${label}</span>
    ${inp}
  </div>`;
}

function inp(val='',opts={}) {
  const {type='text',placeholder='',min,max,step,dk,list,idx,field,rerender,extra=''} = opts;
  const data = dk?`data-key="${dk}"`:'';
  const dlist = list?`data-list="${list}" data-idx="${idx}" data-field="${field}"`:'';
  const drr = rerender?`data-rerender="1"`:'';
  return `<input type="${type}" value="${esc(val||'')}" placeholder="${placeholder}" ${min!==undefined?`min="${min}"`:''}
    ${max!==undefined?`max="${max}"`:''}  ${step!==undefined?`step="${step}"`:''}
    ${data} ${dlist} ${drr} ${extra}>`;
}

function sel(val='',options=[],opts={}) {
  const {dk,list,idx,field,rerender,extra=''} = opts;
  const data = dk?`data-key="${dk}"`:'';
  const dlist = list?`data-list="${list}" data-idx="${idx}" data-field="${field}"`:'';
  const drr = rerender?`data-rerender="1"`:'';
  return `<select ${data} ${dlist} ${drr} ${extra}>
    ${options.map(o=>`<option value="${o.v}" ${o.v===val?'selected':''}>${esc(o.l)}</option>`).join('')}
  </select>`;
}

      ${field('Defendant', inp(s.defendant,{dk:'defendant',placeholder:'Acme Corporation'}))}

      ${field('Claim type',sel(s.claimType,[{v:'both',l:'Discrimination + FLSA Overtime'},{v:'discrimination',l:'Discrimination only'},{v:'flsa',l:'FLSA Overtime only'}],{dk:'claimType',rerender:'1'}))}

}

// ── INCIDENTS TAB ──

    <strong>Incident dates</strong> determine when back pay begins. Add an <strong>end date</strong> if the adverse action had a defined end (rehire date, suspension end date). For <strong>failure to hire/promote</strong>, enter the decision date and the salary the plaintiff would have earned in the wage periods tab.

      Code DD — Cost of employer-sponsored health coverage<br>

// ── FLSA TAB ──
function renderFlsa() {
  const s=STATE;
  if (s.claimType==='discrimination') return `<div class="card"><div class="info-box">FLSA overtime applies to overtime claims. Switch claim type to "FLSA" or "Both" in Case Setup.</div></div>`;
  return `
  <div class="info-box">
    <strong>FLSA overtime:</strong> Damages = unpaid OT wages + equal liquidated damages + prejudgment interest. The <strong>regular rate</strong> must include all remuneration (base pay + non-discretionary bonuses + commissions ÷ hours worked).
  </div>
  ${s.flsaPeriods.map((fp,i)=>{
    const rate=parseFloat(fp.regularRate)||0, wkHrs=parseFloat(fp.weeklyHours)||0, wks=parseFloat(fp.weeksWorked)||0;
    const mult=fp.otMethod==='full'?1.5:0.5;
    const otHrs=Math.max(0,wkHrs-40)*wks;
    const otWages=otHrs*rate*mult;
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="font-size:14px">FLSA Period #${i+1}${fp.description?' — '+esc(fp.description):''}</div>
        ${s.flsaPeriods.length>1?`<button class="btn-remove" onclick="STATE.flsaPeriods.splice(${i},1);renderTab()">×</button>`:''}
      </div>
      <div class="g3">
        ${field('Period start date',`<input type="date" value="${esc(fp.startDate)}" data-list="flsaPeriods" data-idx="${i}" data-field="startDate">`)}
        ${field('Period end date',`<input type="date" value="${esc(fp.endDate)}" data-list="flsaPeriods" data-idx="${i}" data-field="endDate">`)}
        ${field('Position / job title',`<input type="text" value="${esc(fp.description||'')}" placeholder="Warehouse associate" data-list="flsaPeriods" data-idx="${i}" data-field="description">`)}
        ${field('Regular rate of pay ($/hr)',`<input type="number" value="${esc(fp.regularRate)}" placeholder="18.50" min="0" step="0.01" data-list="flsaPeriods" data-idx="${i}" data-field="regularRate">`)}
        ${field('Avg weekly hours worked (total)',`<input type="number" value="${esc(fp.weeklyHours)}" placeholder="50" min="40" step="0.5" data-list="flsaPeriods" data-idx="${i}" data-field="weeklyHours">`)}
        ${field('Number of weeks in period',`<input type="number" value="${esc(fp.weeksWorked)}" placeholder="52" min="1" data-list="flsaPeriods" data-idx="${i}" data-field="weeksWorked">`)}
      </div>
      ${field('OT payment received from employer',sel(fp.otMethod||'half',[
        {v:'half',l:'Straight time paid for OT hours — claiming half-time premium (0.5× rate)'},
        {v:'full',l:'No compensation received for OT hours — claiming full OT pay (1.5× rate)'}
      ],{list:'flsaPeriods',idx:i,field:'otMethod'}),'margin-top:12px')}
      ${rate>0&&wkHrs>40&&wks>0?`
      <div class="g3" style="margin-top:12px">
        <div class="metric-card">
          <div class="metric-label">Total OT hours</div>
          <div class="metric-value">${otHrs.toFixed(1)} hrs</div>
          <div class="metric-sub">${(wkHrs-40).toFixed(1)} OT hrs/wk × ${wks} weeks</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Unpaid OT wages</div>
          <div class="metric-value">${$$(otWages)}</div>
          <div class="metric-sub">${mult}× × $${rate.toFixed(2)}/hr</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">+ Liquidated damages</div>
          <div class="metric-value gold">${$$(otWages)}</div>
          <div class="metric-sub">Equal amount (§216(b))</div>
        </div>
      </div>`:''}
    </div>`;
  }).join('')}
  <button class="btn-add" onclick="STATE.flsaPeriods.push({id:uid(),startDate:'',endDate:'',regularRate:'',weeklyHours:'',weeksWorked:'',description:'',otMethod:'half'});renderTab()">
    + Add FLSA period (different position or pay rate)
  </button>`;
}

// ── DOL RATES TAB ──
function renderRates() {
  const s=STATE;
  const recent=DOL_RATES.filter(r=>r.y>=2020);
  return `
  <div class="card">
    <div class="card-title">DOL Prejudgment Interest Rates</div>
    <div class="card-sub">IRS underpayment rate (26 U.S.C. § 6621), adopted by courts for employment discrimination and FLSA prejudgment interest. Pre-loaded through Q2 2026. Override any quarter below.</div>
    <div class="g4">
      ${recent.map(rate=>{
        const key=`${rate.y}Q${rate.q}`;
        const isCustom=s.customRates[key]!=null&&s.customRates[key]!=='';
        return `<div class="rate-cell ${isCustom?'custom':''}">
          <div style="font-size:10px;color:var(--gray-400);margin-bottom:4px">${rate.y} Q${rate.q}</div>
          <div style="display:flex;align-items:baseline;gap:3px">
            <input type="number" value="${isCustom?s.customRates[key]:''}" placeholder="${rate.r}"
              style="width:48px;border:none;background:transparent;font-size:15px;font-weight:500;padding:0;outline:none;color:${isCustom?'var(--gold-d)':'var(--text)'}"
              step="0.25" min="0"
              onchange="STATE.customRates['${key}']=this.value===''?null:this.value;this.parentElement.parentElement.className='rate-cell '+(this.value?'custom':'');updateHeaderTotal();scheduleSave()">
            <span style="font-size:13px;color:var(--gray-400)">%</span>
          </div>
          ${isCustom?'<div style="font-size:10px;color:var(--gold-d)">custom</div>':''}
        </div>`;
      }).join('')}
    </div>
    <button class="btn-add" style="margin-top:12px" onclick="STATE.customRates={};renderTab()">Reset all to DOL defaults</button>
  </div>
  <div class="card" style="font-size:12px;color:var(--gray-400);line-height:1.7">
    <strong>Source:</strong> IRS Rev. Rul. / Notice published each quarter. Title VII / ADEA / ADA: prejudgment interest is discretionary; courts typically apply the federal IRS underpayment rate (Fed Funds + 3%). FLSA: interest runs from the date each OT payment was due.
  </div>`;
}

// ── RESULTS TAB ──
function renderResults() {
  const s=STATE;
  // Build per-scenario results
  const scenarioResults = s.scenarios.map(sc=>{
    if (!sc.trialDate) return {sc, res:null};
    const tmpState={...s, activeScenarioId:sc.id, scenarios:s.scenarios};
    const trial=sc.trialDate;
    const includeDisc=s.claimType!=='flsa';
    const includeFlsa=s.claimType!=='discrimination';
    const disc=includeDisc?computeDiscrimination({...s,activeScenarioId:sc.id},trial):null;
    const flsa=includeFlsa?computeFlsa(s,trial):null;
    const discTotal=disc?.discTotal||0;
    const flsaTotal=flsa?.flsaTotal||0;
    return {sc, disc, flsa, discTotal, flsaTotal, grand:discTotal+flsaTotal};
  }).filter(r=>r.res!==null||r.disc||r.flsa);

  const activeRes=scenarioResults.find(r=>r.sc.id===s.activeScenarioId)||scenarioResults[0];

  if (!activeRes) {
    return `<div class="card" style="text-align:center;padding:56px 24px">
      <div style="font-size:36px;margin-bottom:16px;color:var(--gray-100)">⚖</div>
      <div style="font-size:16px;color:var(--gray-400);margin-bottom:8px">No damages calculated yet</div>
      <div style="font-size:13px;color:var(--gray-200)">Complete Case Setup with at least one scenario trial date, one incident, and one wage period.</div>
    </div>`;
  }

  const {disc, flsa, discTotal, flsaTotal, grand} = activeRes;
  const incDate = disc?.rows[0]?.start;

  return `
  <!-- Scenario tabs -->
  ${scenarioResults.length>1?`
  <div class="scenario-tabs">
    ${scenarioResults.map(r=>`
      <button class="scenario-tab ${r.sc.id===s.activeScenarioId?'active':''}"
        onclick="STATE.activeScenarioId='${r.sc.id}';renderTab()">
        ${esc(r.sc.name)}<br><span style="font-size:11px;color:${r.sc.id===s.activeScenarioId?'var(--gold-d)':'var(--gray-400)'}">
          ${r.grand>0?$$(r.grand):'—'}
        </span>
      </button>`).join('')}
  </div>`:''}

  <!-- Export bar -->
  <div class="export-bar">
    <button class="btn btn-navy" onclick="exportExcel()">⬇ Download Excel</button>
    <button class="btn btn-navy" onclick="exportPDF()">⬇ Download PDF</button>
    <div class="period-toggle">
      ${['annual','monthly','weekly'].map(p=>`
        <button class="period-btn ${s.displayPeriod===p?'active':''}"
          onclick="STATE.displayPeriod='${p}';renderTab()">
          ${p.charAt(0).toUpperCase()+p.slice(1)}
        </button>`).join('')}
    </div>
  </div>

  <!-- Metric cards -->
  <div class="${disc&&flsa?'g4':'g3'}" style="margin-bottom:14px">
    ${disc?`
      <div class="metric-card"><div class="metric-label">Net back pay</div><div class="metric-value">${$$(disc.totBP)}</div></div>
      <div class="metric-card"><div class="metric-label">Lost benefits</div><div class="metric-value">${$$(disc.totBen)}</div></div>
      <div class="metric-card"><div class="metric-label">Prejudgment interest</div><div class="metric-value">${$$(disc.totInt)}</div></div>`:''}
    ${flsa?`
      <div class="metric-card"><div class="metric-label">Unpaid OT wages</div><div class="metric-value">${$$(flsa.totOT)}</div></div>
      <div class="metric-card"><div class="metric-label">Liquidated damages</div><div class="metric-value">${$$(flsa.totLiq)}</div></div>
      <div class="metric-card"><div class="metric-label">FLSA interest</div><div class="metric-value">${$$(flsa.totFInt)}</div></div>`:''}
  </div>

  <!-- Total banner -->
  <div class="total-banner">
    <div>
      <div class="total-banner-label">Estimated Total Damages</div>
      <div class="total-banner-sub">${s.plaintiff||'Plaintiff'} — ${incDate?incDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'} through ${dt(activeRes.sc.trialDate)}</div>
      ${disc&&flsa?`<div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:4px">Discrimination: ${$$(discTotal)} + FLSA: ${$$(flsaTotal)}</div>`:''}
    </div>
    <div class="total-banner-amount">${$$(grand)}</div>
  </div>

  <!-- Scenario comparison (if multiple) -->
  ${scenarioResults.length>1?`
  <div class="card">
    <div class="card-title">Scenario Comparison</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Scenario</th><th>Trial Date</th>
          ${disc?'<th class="r">Back Pay</th><th class="r">Benefits</th><th class="r">Interest</th>':''}
          ${flsa?'<th class="r">FLSA OT</th><th class="r">Liquidated</th>':''}
          <th class="r">Total</th>
        </tr></thead>
        <tbody>
          ${scenarioResults.map(r=>`<tr ${r.sc.id===s.activeScenarioId?'style="background:var(--gold-bg)"':''}>
            <td class="bold">${esc(r.sc.name)}</td>
            <td>${dt(r.sc.trialDate)}</td>
            ${r.disc?`<td class="r">${$$(r.disc.totBP)}</td><td class="r">${$$(r.disc.totBen)}</td><td class="r">${$$(r.disc.totInt)}</td>`:(disc?'<td class="r">—</td><td class="r">—</td><td class="r">—</td>':'')}
            ${r.flsa?`<td class="r">${$$(r.flsa.totOT)}</td><td class="r">${$$(r.flsa.totLiq)}</td>`:(flsa?'<td class="r">—</td><td class="r">—</td>':'')}
            <td class="r gold">${$$(r.grand)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}

  <!-- Back wages breakdown -->
  ${disc&&disc.rows.length?`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:4px">
      <div class="card-title">Back Wages — ${s.displayPeriod.charAt(0).toUpperCase()+s.displayPeriod.slice(1)} Breakdown</div>
    </div>
    <div class="card-sub">Mitigation deducted: ${$$(disc.totMit)} total · Benefits: ${s.benefitsMethod==='w2'?'W-2 actual':`BLS estimate (${(parseFloat(s.customBenefitsRate)||BLS[s.employerType]||32.5).toFixed(1)}%)`}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Period</th><th class="r">Days</th><th class="r">Expected wages</th>
          <th class="r">Mitigation (−)</th><th class="r">Net back pay</th>
          <th class="r">Benefits</th><th class="r">Interest</th><th class="r">Subtotal</th>
          <th class="r" style="color:var(--gold)">Running Total</th>
        </tr></thead>
        <tbody>
          ${(()=>{let run=0;return disc.rows.map((row,i)=>{run+=row.sub;return`<tr>
            <td class="bold">${esc(row.label)}</td>
            <td class="r" style="color:var(--gray-400)">${row.dd}</td>
            <td class="r">${$$(row.expWages)}</td>
            <td class="r" style="color:${row.mitWages>0?'var(--danger)':'var(--gray-200)'}">${row.mitWages>0?'('+$$(row.mitWages)+')':'—'}</td>
            <td class="r bold">${$$(row.netBP)}</td>
            <td class="r">${$$(row.benefits)}</td>
            <td class="r">${$$(row.interest)}</td>
            <td class="r gold">${$$(row.sub)}</td>
            <td class="r" style="color:var(--gold-d);font-weight:600">${$$(run)}</td>
          </tr>`;}).join('');})()}
        </tbody>
        <tfoot><tr>
          <td colspan="2">Totals</td>
          <td class="r">${$$(disc.rows.reduce((a,r)=>a+r.expWages,0))}</td>
          <td class="r" style="color:${disc.totMit>0?'#f0a0a0':'rgba(255,255,255,.3)'}">${disc.totMit>0?'('+$$(disc.totMit)+')':'—'}</td>
          <td class="r">${$$(disc.totBP)}</td>
          <td class="r">${$$(disc.totBen)}</td>
          <td class="r">${$$(disc.totInt)}</td>
          <td class="r gold">${$$(disc.discTotal)}</td>
          <td class="r gold">${$$(disc.discTotal)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`:''}

  <!-- FLSA breakdown -->
  ${flsa&&flsa.flsaRows.length?`
  <div class="card">
    <div class="card-title">FLSA Overtime Breakdown</div>
    <div class="card-sub">Unpaid OT wages + equal liquidated damages + prejudgment interest</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Period / Position</th><th class="r">OT Hours</th><th class="r">OT Wages</th>
          <th class="r">Liquidated</th><th class="r">Interest</th><th class="r">Subtotal</th>
        </tr></thead>
        <tbody>
          ${flsa.flsaRows.map(row=>`<tr>
            <td>${esc(row.startDate)} – ${esc(row.endDate||'present')}${row.description?' · '+esc(row.description):''}</td>
            <td class="r">${row.otHrs.toFixed(1)}</td>
            <td class="r">${$$(row.ot)}</td>
            <td class="r">${$$(row.liq)}</td>
            <td class="r">${$$(row.fi)}</td>
            <td class="r gold">${$$(row.sub)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td>FLSA Total</td><td class="r">—</td><td class="r">${$$(flsa.totOT)}</td>
          <td class="r">${$$(flsa.totLiq)}</td><td class="r">${$$(flsa.totFInt)}</td>
          <td class="r gold">${$$(flsa.flsaTotal)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`:''}

  <div style="margin-top:18px;padding:16px 20px;background:var(--gray-50);border-radius:var(--r);border:1px solid var(--gray-100)">
    <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Notes &amp; Sources</div>
    <div style="font-size:11.5px;color:var(--text-2);line-height:1.85">
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">1</sup>&nbsp;<strong>Prejudgment Interest:</strong>
        Calculated using the IRS underpayment rate established under 26 U.S.C. § 6621(a)(2), applied quarterly from the midpoint of each damage period through the projected trial date.
        Rates are published quarterly by the Internal Revenue Service in Revenue Rulings and Notices (see <em>I.R.S. Rev. Rul.</em> for each applicable quarter).
        Interest accrues on the sum of net back pay and lost benefits per period. This figure will be updated and recalculated through the actual date of judgment.
      </p>
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">2</sup>&nbsp;<strong>Lost Employer-Paid Benefits${s.benefitsMethod==='estimate'?` (BLS Estimate)`:` (Actual)`}:</strong>
        ${s.benefitsMethod==='estimate'
          ? `Benefits losses are estimated at <strong>${(parseFloat(s.customBenefitsRate)||BLS[s.employerType]||32.5).toFixed(1)}% of gross back wages</strong>, reflecting supplementary (voluntary) employer-paid benefits based on the U.S. Bureau of Labor Statistics <em>Employer Costs for Employee Compensation</em> (ECEC) survey, Table 1 (${BLS_L[s.employerType]}, civilian workers), fourth quarter 2024 release. This rate excludes legally-required employer costs (Social Security, Medicare, FUTA, workers' compensation) which are not recoverable as lost benefits. See U.S. Bureau of Labor Statistics, <em>Employer Costs for Employee Compensation — December 2024</em>, USDL-25-0379 (Mar. 2025), available at <em>www.bls.gov/news.release/ecec.htm</em>. This estimate will be supplemented or replaced by actual plan documentation, W-2 records, and employer benefits statements prior to trial.`
          : `Benefits losses reflect actual employer-paid benefit costs as documented by W-2 records, plan documents, and premium statements produced in discovery. These figures will be updated as additional documentation becomes available through the close of discovery.`
        }
      </p>
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">3</sup>&nbsp;<strong>Back Pay Calculation Methodology:</strong>
        Expected wages are calculated based on the plaintiff's documented compensation as of the date of the adverse employment action, compounded by applicable annual increases through the projected trial date. Mitigation earnings are deducted on a pro-rata daily basis for all periods of overlapping employment. All figures reflect gross compensation before applicable taxes.
      </p>
      <p style="margin-bottom:0;font-style:italic;color:var(--gray-400)">
        All damages figures presented herein are estimates based on information currently available and are subject to revision. Plaintiff reserves the right to update and supplement these calculations as additional discovery is received, and through the date of judgment or verdict.
      </p>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// 7b. TOAST UTILITY
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { info:'#162240', success:'#1a7a4a', error:'#B83232', warning:'#92400e' };
  const bgs   = { info:'#E8F0FE',  success:'#eafaf1', error:'#fdecea',  warning:'#fff8e6' };
  el.textContent = msg;
  el.style.background = bgs[type]||bgs.info;
  el.style.color = colors[type]||colors.info;
  el.style.border = '1px solid ' + (colors[type]||colors.info);
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display='none'; }, type==='error'?6000:3500);
}

// ─────────────────────────────────────────────
// 8. INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async ()=>{
  updateConnectionStatus();
  await updateCaseSelect();
  renderTab();
  // Close modals on overlay click
  document.getElementById('cases-modal').addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeCasesModal();
  });
  document.getElementById('blob-config-modal').addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeBlobConfigModal();
  });
  // If blob is configured, check connection health silently
  const cfg = getBlobCfg();
  if (cfg) {
    testBlobConnection(cfg).then(ok=>{
      if (!ok) showToast('⚠ Azure Blob Storage connection failed. Check your SAS token has not expired.', 'warning');
    });
  }
});
</script>
