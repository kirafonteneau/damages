}

function attachInputListeners() {
  document.querySelectorAll('#tab-content input, #tab-content select, #tab-content textarea').forEach(el=>{
    el.addEventListener('change',handleChange);
    if (el.tagName==='INPUT'&&el.type!=='radio'&&el.type!=='checkbox') el.addEventListener('input',handleChange);
  });
  // Anchor empty date pickers to a recent year so the calendar widget opens
  // in the right decade instead of at year 0001/0005 (browser default for
  // empty <input type="date"> fields). We seed the value on focus, then
  // clear it on blur if the user didn't actually pick something — so blank
  // remains a meaningful state ("runs to trial", "ongoing").
  document.querySelectorAll('#tab-content input[type="date"]').forEach(el => {
    el.addEventListener('focus', () => {
      if (!el.value) {
        // Pick an anchor inside [min, max] — prefer today, fall back to max, then min.
        const max = el.getAttribute('max');
        const min = el.getAttribute('min');
        const today = todayISO();
        let anchor = today;
        if (max && today > max) anchor = max;
        else if (min && today < min) anchor = min;
        el.dataset.anchored = '1';
        el.value = anchor;
      }
    });
    el.addEventListener('blur', () => {
      // If we anchored an empty field and the user didn't actually change it,
      // restore blank so the field's "runs to trial / ongoing" semantics survive.
      if (el.dataset.anchored === '1') {
        delete el.dataset.anchored;
        // If the underlying STATE never received this value (handleChange writes it),
        // we can detect that by reading STATE for the input's data-list/data-field.
        // Simpler heuristic: if the value still equals the anchor we set AND the
        // user never typed/picked, clear it. We can't perfectly detect "didn't pick",
        // so we always clear on blur — if they DID pick the same date as the anchor,
        // change event already fired and STATE is updated; renderTab() will repaint
        // it back. The clear here only affects the visible DOM until next render.
        // Safest: only clear if STATE says the field is empty.
        const list = el.getAttribute('data-list');
        const idx = el.getAttribute('data-idx');
        const field = el.getAttribute('data-field');
        const key = el.getAttribute('data-key');
        const rcId = el.getAttribute('data-rate-change-id');
        let stored = null;
        try {
          if (key) stored = STATE[key];
          else if (list && idx !== null && field) {
            const item = STATE[list]?.[Number(idx)];
            if (rcId && Array.isArray(item?.rateChanges)) {
              stored = item.rateChanges.find(r => r.id === rcId)?.[field];
            } else if (item) {
              stored = item[field];
            }
          }
        } catch {}
        if (!stored) el.value = '';
      }
    });
  });
}

function pruneOverride(weekOverrides, weekKey){
  if (!weekOverrides || !weekOverrides[weekKey]) return;
  const ov = weekOverrides[weekKey];
  const empty = Object.keys(ov).every(k => ov[k] === '' || ov[k] === undefined || ov[k] === null);
  if (empty) delete weekOverrides[weekKey];
}

function handleChange(e) {
  const el=e.target;
  const key=el.dataset.key;
  const idx=el.dataset.idx!==undefined?Number(el.dataset.idx):null;
  const list=el.dataset.list;
  const field=el.dataset.field;
  const overridesKey=el.dataset.overridesKey;
  const rateChangeId=el.dataset.rateChangeId;
  let val=el.type==='checkbox'?el.checked:el.value;
  // Reject obvious year-typo dates (e.g. 0002-01-24 from typing "2-1-24" into
  // a date field). The browser's min/max only blocks on form submit; on
  // 'input' events we have to gate it ourselves. Empty string passes — blank
  // is meaningful for end-date fields ("runs to trial").
  if (el.type === 'date' && val && !isValidISODate(val)) {
    // Don't write the bad value to STATE — just ignore until they finish typing
    // a valid date.
    return;
  }
  // Per-week override (FLSA weekly grid): list=flsaPeriods, idx, data-overrides-key=weekKey, data-field
  if (list==='flsaPeriods' && idx!==null && overridesKey && field) {
    const fp = STATE.flsaPeriods[idx];
    if (fp) {
      if (!fp.weekOverrides) fp.weekOverrides = {};
      if (!fp.weekOverrides[overridesKey]) fp.weekOverrides[overridesKey] = {};
      fp.weekOverrides[overridesKey][field] = val;
      pruneOverride(fp.weekOverrides, overridesKey);
    }
  }
  // Rate-change row (FLSA rate timeline): list=flsaPeriods, idx, data-rate-change-id=rcId, data-field
  else if (list==='flsaPeriods' && idx!==null && rateChangeId && field) {
    const fp = STATE.flsaPeriods[idx];
    if (fp && Array.isArray(fp.rateChanges)) {
      const rc = fp.rateChanges.find(r => r.id === rateChangeId);
      if (rc) {
        // Snap effectiveDate to the period's workweek start day
        if (field === 'effectiveDate' && val) {
          rc[field] = weekStartOf(val, fp.workweekStart || 1);
        } else {
          rc[field] = val;
        }
      }
    }
  }
  else if (list&&field&&idx!==null) {
    STATE[list][idx][field]=val;
    if (list==='wagePeriods' && field==='hoursPerWeek') {
      const _wp = STATE.wagePeriods[idx];
      if (_wp.overtimeHoursPerWeek === '') _wp.overtimeHoursPerWeek = String(Math.max(0,(parseFloat(val)||0)-40)||'').replace(/^0$/,'');
    }
    if (list==='mitigationPeriods' && (field==='hourlyRate'||field==='hoursPerWeek'||field==='overtimeHoursPerWeek')) {
      const _mp = STATE.mitigationPeriods[idx];
      const r=parseFloat(_mp.hourlyRate)||0, h=parseFloat(_mp.hoursPerWeek)||0, o=parseFloat(_mp.overtimeHoursPerWeek)||0;
      if(r&&h) _mp.annualWages=String(Math.round(r*(h+0.5*o)*52));
    }
  } else if (key) {
    setNested(STATE,key,val);
  }
  // Re-render if structural change needed
  if (el.dataset.rerender==='1') renderTab();
  else {
    updateHeaderTotal();
    scheduleSave();
    // Keep the case dropdown label in sync as user types case/plaintiff name
    if (key && ['caseName','plaintiff','defendant'].includes(key)) {
      const derived = deriveCaseName(STATE);
      const sel = document.getElementById('case-select');
      if (sel && currentCaseId) {
        const opt = sel.querySelector(`option[value="${currentCaseId}"]`);
        if (opt) opt.textContent = derived;
      }
    }
  }
}

function setNested(obj,key,val) {
  const parts=key.split('.');
  let cur=obj;
  for (let i=0;i<parts.length-1;i++) cur=cur[parts[i]];
  cur[parts[parts.length-1]]=val;
}

function updateHeaderTotal() {
  const res=computeAll(STATE);
  const el=document.getElementById('header-total');
  const valEl=document.getElementById('header-total-value');
  if (res) { el.style.display='block'; valEl.textContent=$$(res.grand); }
  else { el.style.display='none'; }
  scheduleSave();
}

function inp(val='',opts={}) {
  const {type='text',placeholder='',min,max,step:_rawStep,dk,list,idx,field,rerender,extra=''} = opts;

function sel(val='',options=[],opts={}) {

            <button type="button" class="btn btn-sm" style="flex:1;border-radius:0;background:${sc.flsaWillful===false?'var(--navy)':'transparent'};color:${sc.flsaWillful===false?'var(--gold)':'var(--text-2)'};border:none;border-left:1px solid var(--gray-100);font-size:11px" onclick="STATE.scenarios[${i}].flsaWillful=false;renderTab();updateHeaderTotal();scheduleSave()" title="2-year lookback under 29 U.S.C. § 255(a) for non-willful violations">Non-willful — 2 yr</button>
          </div>
        </div>`:''}
        <div>

          <div style="display:flex;gap:6px">

              ${sc.id===s.activeScenarioId?'✓ Active':'Set Active'}

            ${s.scenarios.length>1?`<button class="btn-remove" onclick="STATE.scenarios.splice(${i},1);if(STATE.activeScenarioId==='${sc.id}')STATE.activeScenarioId=STATE.scenarios[0].id;renderTab()">×</button>`:''}

// ── INCIDENTS TAB ──

  return `

  </div>
  <div class="info-box" style="margin-top:8px">You can add multiple incidents to model overlapping discriminatory acts. Each generates its own back pay period, all accruing simultaneously.</div>
  ${s.incidents.map((inc,i)=>`
    <div class="incident-card ${inc.endDate?'has-end':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:500;color:var(--navy-2)">Incident #${i+1}

                ${inc.type==='failure_hire'?`<p style="font-size:11px;color:var(--gray-400);margin:2px 0 8px;">Enter the date the position was filled by a candidate outside the protected class. If unknown, use the decision date as a conservative estimate.</p>`:``}

// ── FLSA TAB ──
// ── FLSA per-period UI state (selection, expanded months) ──
const FLSA_UI = {
  selected: {},   // periodId -> Set<weekKey>
  collapsed: {},  // periodId -> Set<'YYYY-MM'> (collapsed months)
  showWeekly: {}, // periodId -> bool (toggle visibility of weekly grid)
  bulkExclusionReason: 'vacation',
  editWeek: null
};

function flsaSelected(pid){ FLSA_UI.selected[pid] ||= new Set(); return FLSA_UI.selected[pid]; }
function flsaCollapsed(pid){ FLSA_UI.collapsed[pid] ||= new Set(); return FLSA_UI.collapsed[pid]; }

function flsaToggleSelect(pid, weekKey, checked){
  const sel = flsaSelected(pid);
  if (checked) sel.add(weekKey); else sel.delete(weekKey);
  // Update the selection-count display without a full re-render
  const el = document.getElementById('sel-count-'+pid);
  if (el) el.textContent = sel.size + ' selected';
}
function flsaSelectAllVisible(pid){
  const boxes = document.querySelectorAll(`input.wk-sel-${pid}:not([disabled])`);
  const sel = flsaSelected(pid);
  boxes.forEach(b => { b.checked = true; sel.add(b.dataset.weekKey); });
  const el = document.getElementById('sel-count-'+pid); if (el) el.textContent = sel.size + ' selected';
}
function flsaClearSelection(pid){
  const sel = flsaSelected(pid);
  sel.clear();
  document.querySelectorAll(`input.wk-sel-${pid}`).forEach(b => b.checked = false);
  const el = document.getElementById('sel-count-'+pid); if (el) el.textContent = '0 selected';
}

function flsaBulkSetHours(pid){
  const sel = flsaSelected(pid); if (!sel.size) { showToast('Select weeks first','warning'); return; }
  const v = document.getElementById('bulk-hours-'+pid).value;
  if (v === '') return;
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period) return;
  period.weekOverrides ||= {};
  sel.forEach(wk => {
    period.weekOverrides[wk] ||= {};
    period.weekOverrides[wk].hours = v;
    delete period.weekOverrides[wk].excluded;
    delete period.weekOverrides[wk].exclusionReason;
  });
  flsaClearSelection(pid); renderTab(); updateHeaderTotal(); scheduleSave();
}
function flsaBulkSetRate(pid){
  const sel = flsaSelected(pid); if (!sel.size) { showToast('Select weeks first','warning'); return; }
  const v = document.getElementById('bulk-rate-'+pid).value;
  if (v === '') return;
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period) return;
  period.weekOverrides ||= {};
  sel.forEach(wk => {
    period.weekOverrides[wk] ||= {};
    period.weekOverrides[wk].rate = v;
    delete period.weekOverrides[wk].excluded;
    delete period.weekOverrides[wk].exclusionReason;
  });
  flsaClearSelection(pid); renderTab(); updateHeaderTotal(); scheduleSave();
}
function flsaBulkExclude(pid){
  const sel = flsaSelected(pid); if (!sel.size) { showToast('Select weeks first','warning'); return; }
  const reason = document.getElementById('bulk-reason-'+pid).value;
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period) return;
  period.weekOverrides ||= {};
  sel.forEach(wk => {
    period.weekOverrides[wk] = { excluded:true, exclusionReason:reason };
  });
  flsaClearSelection(pid); renderTab(); updateHeaderTotal(); scheduleSave();
}
function flsaBulkReset(pid){
  const sel = flsaSelected(pid); if (!sel.size) { showToast('Select weeks first','warning'); return; }
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period || !period.weekOverrides) { flsaClearSelection(pid); renderTab(); return; }
  sel.forEach(wk => { delete period.weekOverrides[wk]; });
  flsaClearSelection(pid); renderTab(); updateHeaderTotal(); scheduleSave();
}

function flsaResetWeek(pid, weekKey){
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period || !period.weekOverrides) return;
  delete period.weekOverrides[weekKey];
  renderTab(); updateHeaderTotal(); scheduleSave();
}
function flsaExcludeWeek(pid, weekKey, reason){
  const period = STATE.flsaPeriods.find(p => p.id === pid); if (!period) return;
  period.weekOverrides ||= {};
  period.weekOverrides[weekKey] = { excluded:true, exclusionReason:reason||'vacation' };
  renderTab(); updateHeaderTotal(); scheduleSave();
}


function flsaEditWeek(fpId,weekKey){FLSA_UI.editWeek={fpId,weekKey};renderTab();}
function flsaEndEditWeek(){FLSA_UI.editWeek=null;renderTab();}
function flsaWwAdd(pidx){
  const fp=STATE.flsaPeriods[pidx]; if(!fp)return;
  fp.workweeks=fp.workweeks||[];
  fp.workweeks.push({id:uid(),weekStart:'',regHours:'',otHours:'',rate:'',otReceived:''});
  renderTab(); scheduleSave();
}
function flsaWwRemove(pidx,wid){
  const fp=STATE.flsaPeriods[pidx]; if(!fp||!fp.workweeks)return;
  fp.workweeks=fp.workweeks.filter(w=>w.id!==wid);
  renderTab(); scheduleSave();
}
function flsaWwChange(pidx,wid,field,val){
  const fp=STATE.flsaPeriods[pidx]; if(!fp||!fp.workweeks)return;
  const wk=fp.workweeks.find(w=>w.id===wid); if(!wk)return;
  wk[field]=val;
  updateHeaderTotal(); scheduleSave();
}

function flsaAddRateChange(pidx){
  const fp = STATE.flsaPeriods[pidx]; if (!fp) return;
  fp.rateChanges ||= [];
  // Default effective date = period start, snapped to workweek start
  const startDow = (typeof fp.workweekStart === 'number') ? fp.workweekStart : 1;
  const eff = fp.startDate ? weekStartOf(fp.startDate, startDow) : '';
  fp.rateChanges.push({ id:uid(), effectiveDate:eff, rate:'', note:'' });
  renderTab();
}
function flsaRemoveRateChange(pidx, rcId){
  const fp = STATE.flsaPeriods[pidx]; if (!fp || !fp.rateChanges) return;
  fp.rateChanges = fp.rateChanges.filter(r => r.id !== rcId);
  renderTab(); updateHeaderTotal(); scheduleSave();
}

// Workweek change guard: if overrides or rate changes exist, confirm before clearing.
function flsaChangeWorkweek(pidx, newDow){
  const fp = STATE.flsaPeriods[pidx]; if (!fp) return;
  newDow = parseInt(newDow,10);
  if (fp.workweekStart === newDow) return;
  const ovCount = fp.weekOverrides ? Object.keys(fp.weekOverrides).length : 0;
  const rcCount = (fp.rateChanges||[]).length;
  if (ovCount + rcCount > 0) {
    const msg = `Changing the workweek will clear ${ovCount} weekly override${ovCount===1?'':'s'} and re-snap ${rcCount} rate-change date${rcCount===1?'':'s'} to the new workweek's start day.\n\nContinue?`;
    if (!confirm(msg)) {
      // Revert the dropdown
      const sel = document.querySelector(`select.workweek-sel-${fp.id}`);
      if (sel) sel.value = String(fp.workweekStart);
      return;
    }
    fp.weekOverrides = {};
    (fp.rateChanges||[]).forEach(rc => {
      if (rc.effectiveDate) rc.effectiveDate = weekStartOf(rc.effectiveDate, newDow);
    });
  }
  fp.workweekStart = newDow;
  flsaClearSelection(fp.id);
  renderTab(); updateHeaderTotal(); scheduleSave();
}

function flsaToggleWeekly(pid){
  FLSA_UI.showWeekly[pid] = !FLSA_UI.showWeekly[pid];
  renderTab();
}
function flsaToggleMonth(pid, ym){
  const c = flsaCollapsed(pid);
  if (c.has(ym)) c.delete(ym); else c.add(ym);
  renderTab();
}

function renderFlsa() {
  const s=STATE;
  if (s.claimType==='discrimination') return `<div class="card"><div class="info-box">FLSA overtime applies to overtime claims. Switch claim type to "FLSA" or "Both" in Case Setup.</div></div>`;

  const scenario = s.scenarios.find(sc=>sc.id===s.activeScenarioId)||s.scenarios[0]||{};
  const willful = scenario.flsaWillful !== false;
  const cutoff = flsaCutoff(s, scenario);
  const trial = scenario.trialDate || '';
  const flsa = computeFlsa(s, trial);

  const dowOpts = DOW_NAMES.map((n,i)=>({v:String(i), l:`${DOW_FULL[i]} (${n})`}));
  const reasonOpts = [
    {v:'vacation',l:'Vacation / PTO'},
    {v:'fmla',l:'FMLA leave'},
    {v:'sick',l:'Sick leave'},
    {v:'suspension',l:'Suspension'},
    {v:'no_work',l:'Did not work'},
    {v:'other',l:'Other'}
  ];
  const reasonLabel = v => (reasonOpts.find(r=>r.v===v)||{l:v||'other'}).l;

  const banner = `
    <div class="info-box">
      <strong>FLSA overtime:</strong> Damages = unpaid OT wages + equal liquidated damages.
      Liquidated damages stand in for prejudgment interest under 29 U.S.C. § 216(b); no separate FLSA interest is calculated.
      The <strong>regular rate</strong> must include all remuneration (base pay + non-discretionary bonuses + commissions ÷ hours worked).
    </div>
    ${!s.complaintFiledDate?`<div class="info-box" style="background:var(--gold-bg);border-color:var(--gold-border);color:var(--navy-2)">⚠ <strong>No complaint filing date set.</strong> The FLSA statute-of-limitations cutoff cannot be applied. Set the filing date in <a href="#" onclick="showTab('setup');return false" style="color:var(--gold-d);font-weight:600">Case Setup</a> to cap damages at the ${willful?'3-year willful':'2-year non-willful'} period under 29 U.S.C. § 255(a).</div>`:''}
  `;

  const periodsHtml = s.flsaPeriods.map((fp,i)=>renderFlsaPeriod(fp, i, flsa, scenario, willful, cutoff, trial, dowOpts, reasonOpts, reasonLabel)).join('');

  return `
    ${banner}
    ${periodsHtml}
    <button class="btn-add" onclick="STATE.flsaPeriods.push({id:uid(),startDate:'',endDate:'',description:'',otMethod:'half',workweekStart:1,defaultRegularRate:'',defaultWeeklyHours:'',rateChanges:[],weekOverrides:{}});renderTab()">
      + Add FLSA period (different position or pay rate)
    </button>`;
}

        rowMenu = '';
      } else if (isUserExcluded) {
        hoursCell = rateCell = methCell = otCell = otWagesCell = '—';
        statusCell = `<span class="tag warn">Excluded — ${esc(reasonLabel(w.exclusionReason))}</span>`;
        rowMenu = `<button class="btn-remove" onclick="flsaResetWeek('${fp.id}','${w.weekKey}')" title="Restore to defaults">↻</button>`;
      } else {
        const isActive = FLSA_UI.editWeek && FLSA_UI.editWeek.fpId===fp.id && FLSA_UI.editWeek.weekKey===w.weekKey;
        if (isActive) {
        hoursCell = `<input type="number" class="cell-input ${overrideHours?'':'is-default'}" value="${overrideHours?esc(ov.hours):''}" placeholder="${inheritedHours||0}" min="0" step="any" data-list="flsaPeriods" data-idx="${i}" data-overrides-key="${w.weekKey}" data-field="hours" onkeydown="if(event.key==='Enter'||event.key==='Escape')flsaEndEditWeek()">`;
        rateCell  = `<input type="number" class="cell-input ${overrideRate?'':'is-default'}" value="${overrideRate?esc(ov.rate):''}" placeholder="${inheritedRate.toFixed(2)}" min="0" step="any" data-list="flsaPeriods" data-idx="${i}" data-overrides-key="${w.weekKey}" data-field="rate" onkeydown="if(event.key==='Enter'||event.key==='Escape')flsaEndEditWeek()">`;
        methCell  = `<select class="cell-input" data-list="flsaPeriods" data-idx="${i}" data-overrides-key="${w.weekKey}" data-field="otMethod" data-rerender="1"><option value="" ${!overrideMeth?'selected':''}>(default: ${inheritedMeth==='full'?'1.5×':'0.5×'})</option><option value="half" ${ov.otMethod==='half'?'selected':''}>0.5×</option><option value="full" ${ov.otMethod==='full'?'selected':''}>1.5×</option></select>`;
        otCell    = w.otHrs.toFixed(1);
        otWagesCell = $$(w.ot);
        statusCell = (overrideHours||overrideRate||overrideMeth)?`<span class="tag gold">✎ Override</span>`:`<span class="tag muted">Editing…</span>`;
        if (w.isPartial) statusCell += `<span class="tag">Partial</span>`;
        rowMenu = `<button class="btn btn-ghost btn-sm" onclick="flsaEndEditWeek()" title="Done" style="color:var(--green,#22c55e);font-size:14px">✓</button>${(overrideHours||overrideRate||overrideMeth)?`<button class="btn-remove" onclick="flsaResetWeek('${fp.id}','${w.weekKey}')" title="Reset">↻</button>`:''}`;
        } else {
          const _dh = overrideHours?`<strong>${ov.hours}</strong>`:`<span style="color:var(--text-3)">${inheritedHours||40}</span>`;
          const _dr = overrideRate?`<strong>$${parseFloat(ov.rate).toFixed(2)}</strong>`:`<span style="color:var(--text-3)">$${inheritedRate.toFixed(2)}</span>`;
          const _dm = overrideMeth?(ov.otMethod==='full'?'1.5×':'0.5×'):`<span style="color:var(--text-3)">${inheritedMeth==='full'?'1.5×':'0.5×'}</span>`;
          hoursCell=_dh; rateCell=_dr; methCell=_dm;
          otCell=w.otHrs.toFixed(1); otWagesCell=$$(w.ot);
          statusCell=(overrideHours||overrideRate||overrideMeth)?`<span class="tag gold">✎ Override</span>`:`<span class="tag muted">Default</span>`;
          if(w.isPartial)statusCell+=`<span class="tag">Partial</span>`;
          rowMenu=`<button class="btn btn-ghost btn-sm" onclick="flsaEditWeek('${fp.id}','${w.weekKey}')" title="Edit this week" style="font-size:13px">✎</button>${(overrideHours||overrideRate||overrideMeth)?`<button class="btn-remove" onclick="flsaResetWeek('${fp.id}','${w.weekKey}')" title="Reset">↻</button>`:''}`;
        }
      }
      const checked = flsaSelected(fp.id).has(w.weekKey);
      const checkbox = isLocked
        ? '<input type="checkbox" disabled>'
        : `<input type="checkbox" class="wk-sel-${fp.id}" data-week-key="${w.weekKey}" ${checked?'checked':''} onchange="flsaToggleSelect('${fp.id}','${w.weekKey}',this.checked)">`;

      return `<tr class="${cls}${partialCls}" data-week-row="${w.weekKey}">
        <td>${checkbox}</td>
        <td>${dt(w.weekKey)}${w.note?`<span class="tag" title="${esc(w.note)}">note</span>`:''}</td>
        <td class="r days-cell">${daysCell}</td>
        <td class="r ${overrideHours?'ovr':''}">${hoursCell}</td>
        <td class="r ${overrideRate?'ovr':''}">${rateCell}</td>
        <td>${methCell}</td>
        <td class="r">${otCell}</td>
        <td class="r ${overrideHours||overrideRate||overrideMeth?'ovr':''}">${otWagesCell}</td>
        <td>${statusCell}</td>
        <td>${rowMenu}</td>
      </tr>`;
    };

    let tableBody;
    if (collapseByMonth) {
      // Group by YYYY-MM
      const groups = {};
      periodWeeks.forEach(w => {
        const ym = (w.weekKey||'').slice(0,7);
        groups[ym] ||= [];
        groups[ym].push(w);
      });
      const sortedMonths = Object.keys(groups).sort();
      // Auto-open first 3 months by default
      const collapsed = flsaCollapsed(fp.id);
      if (collapsed.size === 0 && sortedMonths.length > 3) {
        sortedMonths.slice(3).forEach(m => collapsed.add(m));
      }
      tableBody = sortedMonths.map(ym => {
        const monthWeeks = groups[ym];
        const monthOt = monthWeeks.reduce((a,w)=>a+(w.ot||0),0);
        const monthOtHrs = monthWeeks.reduce((a,w)=>a+(w.otHrs||0),0);
        const isCollapsed = collapsed.has(ym);
        const monthLabel = new Date(ym+'-01T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
        return `<tbody>
          <tr class="flsa-month-row"><td colspan="10" style="padding:0">
            <div class="flsa-month-header" onclick="flsaToggleMonth('${fp.id}','${ym}')">
              <span>${isCollapsed?'▶':'▼'} ${esc(monthLabel)} · ${monthWeeks.length} workweek${monthWeeks.length===1?'':'s'}</span>
              <span>${monthOtHrs.toFixed(1)} OT hrs · ${$$(monthOt)}</span>
            </div>
          </td></tr>
          ${isCollapsed?'':monthWeeks.map(renderRow).join('')}
        </tbody>`;
      }).join('');
    } else {
      tableBody = `<tbody>${periodWeeks.map(renderRow).join('')}</tbody>`;
    }

    weeklyHtml = `
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--gray-100)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span class="section-label">Weekly breakdown (${periodWeeks.length} workweek${periodWeeks.length===1?'':'s'})</span>
          <button class="btn btn-ghost btn-sm" onclick="flsaToggleWeekly('${fp.id}')">${showWeekly?'Hide':'Show'} weekly grid</button>
        </div>
        ${showWeekly?`
          ${weeklyBanner}
          ${bulkBar}
          <div style="max-height:600px;overflow:auto;border:1px solid var(--gray-100);border-radius:var(--r)">
            <table class="flsa-week-table">
              ${tableHeader}
              ${tableBody}
            </table>
          </div>
        `:''}
      </div>
    `;
  } else if (hasDates) {
    weeklyHtml = `<div class="info-box" style="margin-top:12px">Enter a default regular rate and default weekly hours to see the weekly breakdown.</div>`;
  }

  return `<div class="card">${headerCard}${rateTimelineHtml}${totalsHtml}${weeklyHtml}${wwHtml}</div>`;
}

// ─── FLSA Minimum Wage ────────────────────────────────────────────────────
function renderFlsaMinWage() {
  const s = STATE;
  if(s.claimType==='discrimination') return `<div class="card"><div class="info-box">FLSA minimum wage claims only apply when FLSA is selected as a claim type. Go to Case Setup and change Claim Type.</div></div>`;
  const periods = s.flsaMinWagePeriods||[];
  const addBtn = `<button class="btn btn-ghost btn-sm" onclick="flsaMwAdd()" style="margin-top:10px">+ Add Period</button>`;
  let html = `<div class="card"><div class="card-title">FLSA — Minimum Wage Claims</div>
  <div class="info-box" style="margin-bottom:14px"><strong>Formula:</strong> (Applicable Minimum Wage − Actual Rate Paid) × Average Weekly Hours × Weeks in Period. Liquidated damages = 100% of back wages. No pre-judgment interest.</div>`;
  if(!periods.length){
    html += `<div style="color:var(--text-2);font-size:12px;margin-bottom:8px">No minimum wage periods added. Click below to add one.</div>${addBtn}</div>`;
    return html;
  }
  periods.forEach((p,i)=>{
    const weeks = (p.startDate && p.endDate) ? Math.max(0,(new Date(p.endDate)-new Date(p.startDate))/(7*864e5)) : 0;
    const minW = parseFloat(p.minWage)||0;
    const actW = parseFloat(p.actualRate)||0;
    const hrs  = parseFloat(p.weeklyHours)||0;
    const diff = Math.max(0, minW-actW);
    const backPay = diff * hrs * weeks;
    const total   = backPay * 2; // with liquidated
    html += `<div class="card" style="margin-bottom:12px;padding:14px 16px">
      <div style="font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <span>Period ${i+1}</span>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="flsaMwRemove(${i})">Remove</button>
      </div>
      <div class="g3">
        <div><label class="field-label">Start Date</label><input type="date" value="${esc(p.startDate||'')}" data-list="flsaMinWagePeriods" data-idx="${i}" data-field="startDate" data-rerender="1" class="input-base"></div>
        <div><label class="field-label">End Date</label><input type="date" value="${esc(p.endDate||'')}" data-list="flsaMinWagePeriods" data-idx="${i}" data-field="endDate" data-rerender="1" class="input-base"></div>
        <div><label class="field-label">Avg Weekly Hours</label><input type="number" min="0" max="168" step="any" value="${esc(p.weeklyHours||'')}" data-list="flsaMinWagePeriods" data-idx="${i}" data-field="weeklyHours" class="input-base"></div>
        <div><label class="field-label">Applicable Min Wage ($/hr)</label><input type="number" min="0" step="any" value="${esc(p.minWage||'')}" data-list="flsaMinWagePeriods" data-idx="${i}" data-field="minWage" class="input-base"></div>
        <div><label class="field-label">Actual Rate Paid ($/hr)</label><input type="number" min="0" step="any" value="${esc(p.actualRate||'')}" data-list="flsaMinWagePeriods" data-idx="${i}" data-field="actualRate" class="input-base"></div>
        <div style="background:var(--gray-50);padding:10px;border-radius:6px;border:1px solid var(--border)">
          <div style="font-size:10px;color:var(--text-2);text-transform:uppercase;font-weight:600">Estimated Damages</div>
          <div style="font-size:15px;font-weight:700;color:var(--navy);margin-top:4px">${$$(total)}</div>
          <div style="font-size:10px;color:var(--text-2);margin-top:2px">${$$(backPay)} wages + ${$$(backPay)} liquidated</div>
        </div>
      </div>
    </div>`;
  });
  html += addBtn + '</div>';
  return html;
}
function flsaMwAdd(){
  STATE.flsaMinWagePeriods = STATE.flsaMinWagePeriods||[];
  STATE.flsaMinWagePeriods.push({id:uid(),startDate:'',endDate:'',weeklyHours:'',minWage:'',actualRate:''});
  renderTab(); scheduleSave();
}
function flsaMwRemove(i){
  STATE.flsaMinWagePeriods.splice(i,1);
  renderTab(); scheduleSave();
}

// ─── Compensatory Damages ─────────────────────────────────────────────────
function renderCompensatory() {
  const s = STATE;
  const items = s.compensatoryItems||[];
  const CATS = [{v:'emotional_distress',l:'Emotional distress / mental anguish'},{v:'medical',l:'Medical / therapy expenses'},{v:'job_search',l:'Job search costs'},{v:'relocation',l:'Moving / relocation expenses'},{v:'replacement_benefits',l:'Replacement benefits costs'},{v:'credit_harm',l:'Credit and financial harm costs'},{v:'commuting',l:'Commuting and transportation differentials'},{v:'training',l:'Training, licensing, and recertification'},{v:'reputation',l:'Reputational harm'},{v:'other',l:'Other'}];
  const catLabel = v => (CATS.find(c=>c.v===v)||{l:v||'—'}).l;
  const total = items.reduce((a,it)=>a+(parseFloat(it.amount)||0),0);
  let html = `<div class="card"><div class="card-title">Compensatory Damages</div>
  <div class="info-box" style="margin-bottom:14px">Record out-of-pocket losses and non-economic damages. Amounts here flow to the Results total and are subject to statutory caps (see Case Setup → Employer Size).<br><strong>Mental anguish:</strong> enter $0 or a placeholder and describe in the Documentation field — the jury sets this amount at trial.</div>
  <div class="table-wrap"><table><thead><tr>
    <th>Description</th><th>Category</th><th style="text-align:right">Amount ($)</th><th>Documentation / Notes</th><th></th>
  </tr></thead><tbody>`;
  if(!items.length){
    html += '<tr><td colspan="5" style="text-align:center;color:var(--text-2);padding:20px">No items yet — click Add Item below</td></tr>';
  }
  items.forEach((it,i)=>{
    html += `<tr>
      <td><input type="text" value="${esc(it.description||'')}" placeholder="e.g. Therapy sessions" data-list="compensatoryItems" data-idx="${i}" data-field="description" class="input-base" style="min-width:160px"></td>
      <td><select data-list="compensatoryItems" data-idx="${i}" data-field="category" class="input-base">${CATS.map(o=>`<option value="${o.v}" ${it.category===o.v?'selected':''}>${o.l}</option>`).join('')}</select></td>
      <td><input type="number" min="0" step="any" value="${esc(it.amount||'')}" placeholder="0.00" data-list="compensatoryItems" data-idx="${i}" data-field="amount" class="input-base" style="text-align:right;width:110px"></td>
      <td><input type="text" value="${esc(it.documentation||'')}" placeholder="Records, receipts, narrative…" data-list="compensatoryItems" data-idx="${i}" data-field="documentation" class="input-base" style="min-width:200px"></td>
      <td><button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="compRemove(${i})">✕</button></td>
    </tr>`;
  });
  html += `</tbody><tfoot><tr>
    <td colspan="2" style="font-weight:600">Total Compensatory</td>
    <td style="text-align:right;font-weight:700;color:var(--navy)">${$$(total)}</td>
    <td colspan="2"></td>
  </tr></tfoot></table></div>
  <button class="btn btn-ghost btn-sm" onclick="compAdd()" style="margin-top:10px">+ Add Item</button></div>`;
  return html;
}
function compAdd(){
  STATE.compensatoryItems = STATE.compensatoryItems||[];
  STATE.compensatoryItems.push({id:uid(),description:'',category:'emotional_distress',amount:'',documentation:''});
  renderTab(); scheduleSave();
}
function compRemove(i){
  STATE.compensatoryItems.splice(i,1);
  renderTab(); scheduleSave();
}

              step="any" min="0"

  </div>`;
}

// ── RESULTS TAB ──
function renderResults() {
  const s=STATE;
  // Build per-scenario results
  const scenarioResults = s.scenarios.map(sc=>{
    if (!sc.trialDate) return {sc, res:null};
    const tmpState={...s, activeScenarioId:sc.id, scenarios:s.scenarios};
    const trial=sc.trialDate;
    const includeDisc=s.claimType!=='flsa';
    const includeFlsa=s.claimType!=='discrimination';
    const disc=includeDisc?computeDiscrimination({...s,activeScenarioId:sc.id},trial):null;
    const flsa=includeFlsa?computeFlsa(s,trial):null;
    const discTotal=disc?.discTotal||0;
    const flsaTotal=flsa?.flsaTotal||0;
    return {sc, disc, flsa, discTotal, flsaTotal, grand:discTotal+flsaTotal};
  }).filter(r=>r.res!==null||r.disc||r.flsa);

  const activeRes=scenarioResults.find(r=>r.sc.id===s.activeScenarioId)||scenarioResults[0];

  if (!activeRes) {
    const hasTrialDate = s.scenarios && s.scenarios.some(sc=>sc.trialDate);
    const hasIncident = s.incidents && s.incidents.length > 0;
    const hasWage = s.wagePeriods && s.wagePeriods.length > 0;
    const esRow = (ok, label, tab, dest) => `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-50)">
      <span style="font-size:17px;color:${ok?'#1E6B3C':'#C05A00'}">${ok?'✓':'⚠'}</span>
      <span style="flex:1;font-size:13px;color:var(--gray-500)">${label}</span>
      ${!ok?`<button onclick="showTab('${tab}')" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline">Go to ${dest}</button>`:''}
    </div>`;
    return `<div class="card" style="max-width:460px;margin:40px auto">
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">Results not yet available</div>
      <div style="font-size:12px;color:var(--gray-400);margin-bottom:16px">Complete all three steps below to calculate damages.</div>
      ${esRow(hasTrialDate,'Trial date set in Case Setup','setup','Setup')}
      ${esRow(hasIncident,'At least one incident added','incidents','Incidents')}
      ${esRow(hasWage,'At least one back wage period entered','wages','Back Wages')}
    </div>`;
  }

  const {disc, flsa, discTotal, flsaTotal, grand} = activeRes;
  const incDate = disc?.rows[0]?.start;
  // ADEA: liquidated damages substitute for prejudgment interest (Lorillard v. Pons; Powers v. Grinnell).
  const noInt = (s.statutoryBasis === 'adea');

  return `
  <!-- Scenario tabs -->
  ${scenarioResults.length>1?`
  <div class="scenario-tabs">
    ${scenarioResults.map(r=>`
      <button class="scenario-tab ${r.sc.id===s.activeScenarioId?'active':''}"
        onclick="STATE.activeScenarioId='${r.sc.id}';renderTab()">
        ${esc(r.sc.name)}<br><span style="font-size:11px;color:${r.sc.id===s.activeScenarioId?'var(--gold-d)':'var(--gray-400)'}">
          ${r.grand>0?$$(r.grand):'—'}
        </span>
      </button>`).join('')}
  </div>`:''}

  <!-- Export bar -->
  <div class="export-bar">
    <button class="btn btn-navy" onclick="exportExcel()">⬇ Download Excel</button>
    <button class="btn btn-navy" onclick="exportPDF()">⬇ Download PDF</button>
    ${scenarioResults.length>1?`
    <button class="btn btn-gold" onclick="exportAllExcel()" title="Export all scenarios to one Excel workbook">⬇ Export All Scenarios (Excel)</button>
    <button class="btn btn-gold" onclick="exportAllPDF()" title="Export all scenarios to one PDF">⬇ Export All Scenarios (PDF)</button>`:''}
    <div class="period-toggle">
      ${['annual','monthly','weekly'].map(p=>`
        <button class="period-btn ${s.displayPeriod===p?'active':''}"
          onclick="STATE.displayPeriod='${p}';renderTab()">
          ${p.charAt(0).toUpperCase()+p.slice(1)}
        </button>`).join('')}
    </div>
  </div>

  <!-- Metric cards -->
  <div class="${disc&&flsa?'g3':(disc?'g3':'g2')}" style="margin-bottom:14px">
    ${disc?`
      <div class="metric-card"><div class="metric-label">Net back pay</div><div class="metric-value">${$$(disc.totBP)}</div></div>
      <div class="metric-card"><div class="metric-label">Lost benefits</div><div class="metric-value">${$$(disc.totBen)}</div></div>
      ${noInt?'':`<div class="metric-card"><div class="metric-label">Prejudgment interest</div><div class="metric-value">${$$(disc.totInt)}</div></div>`}`:''}
    ${flsa?`
      <div class="metric-card"><div class="metric-label">Unpaid OT wages</div><div class="metric-value">${$$(flsa.totOT)}</div></div>
      <div class="metric-card"><div class="metric-label">Liquidated damages</div><div class="metric-value">${$$(flsa.totLiq)}</div></div>`:''}
  </div>

  <!-- Front pay -->
      ${disc?`<div class="metric-card" style="margin-bottom:0"><div class="metric-label">Front pay</div><div class="metric-value gold" id="fp-total">${$$(disc.frontPay)}</div><div class="metric-sub">Projected wage &minus; mitigation &times; years</div></div>`:''}  
          <div class="card" style="margin-bottom:14px;padding:14px 16px;">
                <div class="card-title" style="margin-bottom:8px;">Front Pay (Post-Trial)</div>
                      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                              <div><label class="field-label">Years (max 5)</label><input type="number" min="0" max="5" step="any" class="field-input" value="${STATE.frontPay.years||2}" oninput="STATE.frontPay.years=Math.min(5,Math.max(0,parseFloat(this.value)||0));const r=computeAll(STATE);if(r&&r.disc)document.getElementById('fp-total').textContent=$$(r.disc.frontPay);updateHeaderTotal();scheduleSave()"></div>
                                      <div><label class="field-label">Projected Annual Wage ($)</label><input type="text" class="field-input" value="${STATE.frontPay.projectedWage||''}" oninput="STATE.frontPay.projectedWage=this.value;const r=computeAll(STATE);if(r&&r.disc)document.getElementById('fp-total').textContent=$$(r.disc.frontPay);updateHeaderTotal();scheduleSave()"></div>
                                              <div><label class="field-label">Projected Mitigation ($)</label><input type="text" class="field-input" value="${STATE.frontPay.projectedMitigation||''}" oninput="STATE.frontPay.projectedMitigation=this.value;const r=computeAll(STATE);if(r&&r.disc)document.getElementById('fp-total').textContent=$$(r.disc.frontPay);updateHeaderTotal();scheduleSave()"></div>
                                                    </div>
                                                        </div>
                                                        <!-- Total banner -->
  <div class="total-banner">
    <div>
      <div class="total-banner-label">Estimated Total Damages</div>
      <div class="total-banner-sub">${s.plaintiff||'Plaintiff'} — ${incDate?incDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'} through ${dt(activeRes.sc.trialDate)}</div>
      ${disc&&flsa?`<div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:4px">Discrimination: ${$$(discTotal)} + FLSA: ${$$(flsaTotal)}</div>`:''}
    </div>
    <div class="total-banner-amount">${$$(grand)}</div>
  </div>

  <!-- Scenario comparison (if multiple) -->
  ${scenarioResults.length>1?`
  <div class="card">
    <div class="card-title">Scenario Comparison</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Scenario</th><th>Trial Date</th>
          ${disc?`<th class="r">Back Pay</th><th class="r">Benefits</th>${noInt?'':'<th class="r">Interest</th>'}`:''}
          ${flsa?'<th class="r">FLSA OT</th><th class="r">Liquidated</th>':''}
          <th class="r">Total</th>
        </tr></thead>
        <tbody>
          ${scenarioResults.map(r=>`<tr ${r.sc.id===s.activeScenarioId?'style="background:var(--gold-bg)"':''}>
            <td class="bold">${esc(r.sc.name)}</td>
            <td>${dt(r.sc.trialDate)}</td>
            ${r.disc?`<td class="r">${$$(r.disc.totBP)}</td><td class="r">${$$(r.disc.totBen)}</td>${noInt?'':`<td class="r">${$$(r.disc.totInt)}</td>`}`:(disc?`<td class="r">—</td><td class="r">—</td>${noInt?'':'<td class="r">—</td>'}`:'')}
            ${r.flsa?`<td class="r">${$$(r.flsa.totOT)}</td><td class="r">${$$(r.flsa.totLiq)}</td>`:(flsa?'<td class="r">—</td><td class="r">—</td>':'')}
            <td class="r gold">${$$(r.grand)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}

  <!-- Back wages breakdown -->
  ${disc&&disc.rows.length?`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:4px">
      <div class="card-title">Back Wages — ${s.displayPeriod.charAt(0).toUpperCase()+s.displayPeriod.slice(1)} Breakdown</div>
    </div>
    <div class="card-sub">Mitigation deducted: ${$$(disc.totMit)} total · Benefits: ${s.benefitsMethod==='w2'?'W-2 actual':`BLS estimate (${(parseFloat(s.customBenefitsRate)||BLS[s.employerType]||32.5).toFixed(1)}%)`}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Period</th><th class="r">Days</th><th class="r">Expected wages</th>
          <th class="r">Mitigation (−)</th><th class="r">Net back pay</th>
          <th class="r">Benefits</th>${noInt?'':'<th class="r">Interest</th>'}<th class="r">Subtotal</th>
          <th class="r" style="color:var(--gold)">Running Total</th>
        </tr></thead>
        <tbody>
          ${(()=>{let run=0;return disc.rows.map((row,i)=>{const sub=noInt?(row.netBP+row.benefits):row.sub;run+=sub;return`<tr>
            <td class="bold">${esc(row.label)}</td>
            <td class="r" style="color:var(--gray-400)">${row.dd}</td>
            <td class="r">${$$(row.expWages)}</td>
            <td class="r" style="color:${row.mitWages>0?'var(--danger)':'var(--gray-200)'}">${row.mitWages>0?'('+$$(row.mitWages)+')':'—'}</td>
            <td class="r bold">${$$(row.netBP)}</td>
            <td class="r">${$$(row.benefits)}</td>
            ${noInt?'':`<td class="r">${$$(row.interest)}</td>`}
            <td class="r gold">${$$(sub)}</td>
            <td class="r" style="color:var(--gold-d);font-weight:600">${$$(run)}</td>
          </tr>`;}).join('');})()}
        </tbody>
        <tfoot><tr>
          <td colspan="2">Totals</td>
          <td class="r">${$$(disc.rows.reduce((a,r)=>a+r.expWages,0))}</td>
          <td class="r" style="color:${disc.totMit>0?'#f0a0a0':'rgba(255,255,255,.3)'}">${disc.totMit>0?'('+$$(disc.totMit)+')':'—'}</td>
          <td class="r">${$$(disc.totBP)}</td>
          <td class="r">${$$(disc.totBen)}</td>
          ${noInt?'':`<td class="r">${$$(disc.totInt)}</td>`}
          <td class="r gold">${$$(disc.discTotal)}</td>
          <td class="r gold">${$$(disc.discTotal)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`:''}

  <!-- FLSA breakdown -->
  ${flsa&&flsa.flsaRows.length?`
  <div class="card">
    <div class="card-title">FLSA Overtime Breakdown</div>
    <div class="card-sub">Unpaid OT wages plus an equal amount of liquidated damages (no separate prejudgment interest — see note 4)<sup style="font-weight:600;color:var(--navy)">4</sup>. SOL${flsa.cutoff?' cutoff: '+dt(flsa.cutoff):' not applied (no filing date)'} · ${flsa.willful?'Willful (3-yr)':'Non-willful (2-yr)'}<sup style="font-weight:600;color:var(--navy)">5</sup></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Period / Position</th>
          <th class="r">Wks Counted</th><th class="r">Excluded</th><th class="r">Dropped</th>
          <th class="r">OT Hours</th><th class="r">OT Wages</th>
          <th class="r">Liquidated</th><th class="r">Subtotal</th>
        </tr></thead>
        <tbody>
          ${flsa.flsaRows.map(row=>`<tr>
            <td>${esc(row.startDate)} – ${esc(row.endDate||'present')}${row.description?' · '+esc(row.description):''}</td>
            <td class="r">${row.weeksCounted||0}</td>
            <td class="r">${row.weeksExcluded||0}</td>
            <td class="r">${(row.weeksDroppedBySOL||0)+(row.weeksDroppedPostTrial||0)}</td>
            <td class="r">${row.otHrs.toFixed(1)}</td>
            <td class="r">${$$(row.ot)}</td>
            <td class="r">${$$(row.liq)}</td>
            <td class="r gold">${$$(row.sub)}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td>FLSA Total</td>
          <td class="r">${flsa.flsaRows.reduce((a,r)=>a+(r.weeksCounted||0),0)}</td>
          <td class="r">${flsa.flsaRows.reduce((a,r)=>a+(r.weeksExcluded||0),0)}</td>
          <td class="r">${flsa.flsaRows.reduce((a,r)=>a+(r.weeksDroppedBySOL||0)+(r.weeksDroppedPostTrial||0),0)}</td>
          <td class="r">${flsa.flsaRows.reduce((a,r)=>a+(r.otHrs||0),0).toFixed(1)}</td>
          <td class="r">${$$(flsa.totOT)}</td>
          <td class="r">${$$(flsa.totLiq)}</td>
          <td class="r gold">${$$(flsa.flsaTotal)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>`:''}


  ${(()=>{
    const compItems = s.compensatoryItems||[];
    const compTotal = compItems.reduce((a,it)=>a+(parseFloat(it.amount)||0),0);
    const sizeCaps = {'15-100':50000,'101-200':100000,'201-500':200000,'500+':300000};
    const capAmt = sizeCaps[s.employerSize]||300000;
    const noCapBasis = ['section_1981','adea','fmla'].includes(s.statutoryBasis)||s.claimType==='flsa';
    const capApplies = !noCapBasis && s.claimType!=='flsa';
    const remaining = capApplies ? Math.max(0, capAmt - compTotal) : null;
    if(!compItems.length && !capApplies) return '';
    return `<div class="card" style="margin-top:14px">
      <div class="card-title">Compensatory &amp; Punitive Damages</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px">
        <div class="metric-card">
          <div class="metric-label">Compensatory Total</div>
          <div class="metric-value">${$$(compTotal)}</div>
          <div class="metric-sub">${compItems.length} item${compItems.length===1?'':'s'}</div>
        </div>
        ${capApplies?`
        <div class="metric-card">
          <div class="metric-label">Statutory Cap (${s.employerSize} employees)</div>
          <div class="metric-value">${$$(capAmt)}</div>
          <div class="metric-sub">42 U.S.C. § 1981a(b)(3)</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Remaining for Punitive</div>
          <div class="metric-value ${remaining===0?'red':''}">${remaining===0?'At Cap':$(remaining)}</div>
          <div class="metric-sub">Cap minus compensatory</div>
        </div>`:''}
        ${noCapBasis?`<div class="metric-card">
          <div class="metric-label">Cap Status</div>
          <div class="metric-value" style="font-size:13px">No Cap</div>
          <div class="metric-sub">${s.statutoryBasis==='section_1981'?'§ 1981 — uncapped':s.statutoryBasis==='adea'?'ADEA — no compensatory/punitive':s.statutoryBasis==='fmla'?'FMLA — no punitive cap':'FLSA — separate scheme'}</div>
        </div>`:''}
      </div>
      ${capApplies?`<div class="info-box" style="font-size:11.5px"><strong>Note:</strong> The statutory cap applies to the <em>combined</em> total of compensatory and punitive damages — not to back pay or front pay. Cap based on employer size at time of discrimination (42 U.S.C. § 1981a(b)(3)).</div>`:''}
      ${!compItems.length?`<div style="color:var(--text-2);font-size:12px;margin-top:8px">Add compensatory items in the Compensatory tab.</div>`:`<div class="table-wrap" style="margin-top:12px"><table>
        <thead><tr><th>Description</th><th>Category</th><th class="r">Amount</th></tr></thead>
        <tbody>${compItems.map(it=>`<tr><td>${esc(it.description||'—')}</td><td style="font-size:11px;color:var(--text-2)">${esc(it.category||'')}</td><td class="r">${$$(parseFloat(it.amount)||0)}</td></tr>`).join('')}</tbody>
        <tfoot><tr><td colspan="2" style="font-weight:600">Total</td><td class="r" style="font-weight:700">${$$(compTotal)}</td></tr></tfoot>
      </table></div>`}
    </div>`;
  })()}
    <div style="margin-top:18px;padding:16px 20px;background:var(--gray-50);border-radius:var(--r);border:1px solid var(--gray-100)">
    <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Notes &amp; Sources</div>
    <div style="font-size:11.5px;color:var(--text-2);line-height:1.85">
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">1</sup>&nbsp;<strong>Prejudgment Interest (Title VII / ADA / FMLA / § 1981 back pay only):</strong>
        Calculated using the IRS underpayment rate established under 26 U.S.C. § 6621(a)(2), applied quarterly from the midpoint of each damage period through the projected trial date.
        Rates are published quarterly by the Internal Revenue Service in Revenue Rulings and Notices (see <em>I.R.S. Rev. Rul.</em> for each applicable quarter).
        Interest accrues on the sum of net back pay and lost benefits per period. <strong>Does not apply to ADEA</strong> (see note 6) <strong>or FLSA overtime claims</strong> (see note 4). This figure will be updated and recalculated through the actual date of judgment.
      </p>
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">2</sup>&nbsp;<strong>Lost Employer-Paid Benefits${s.benefitsMethod==='estimate'?` (BLS Estimate)`:` (Actual)`}:</strong>
        ${s.benefitsMethod==='estimate'
          ? `Benefits losses are estimated at <strong>${(parseFloat(s.customBenefitsRate)||BLS[s.employerType]||32.5).toFixed(1)}% of gross back wages</strong>, reflecting supplementary (voluntary) employer-paid benefits based on the U.S. Bureau of Labor Statistics <em>Employer Costs for Employee Compensation</em> (ECEC) survey, Table 1 (${BLS_L[s.employerType]}, civilian workers), fourth quarter 2024 release. This rate excludes legally-required employer costs (Social Security, Medicare, FUTA, workers' compensation) which are not recoverable as lost benefits. See U.S. Bureau of Labor Statistics, <em>Employer Costs for Employee Compensation — December 2024</em>, USDL-25-0379 (Mar. 2025), available at <em>www.bls.gov/news.release/ecec.htm</em>. This estimate will be supplemented or replaced by actual plan documentation, W-2 records, and employer benefits statements prior to trial.`
          : `Benefits losses reflect actual employer-paid benefit costs as documented by W-2 records, plan documents, and premium statements produced in discovery. These figures will be updated as additional documentation becomes available through the close of discovery.`
        }
      </p>
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">3</sup>&nbsp;<strong>Back Pay Calculation Methodology:</strong>
        Expected wages are calculated based on the plaintiff's documented compensation as of the date of the adverse employment action, compounded by applicable annual increases through the projected trial date. Mitigation earnings are deducted on a pro-rata daily basis for all periods of overlapping employment. All figures reflect gross compensation before applicable taxes.
      </p>
      ${flsa?`
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">4</sup>&nbsp;<strong>FLSA Liquidated Damages:</strong>
        29 U.S.C. § 216(b) authorizes liquidated damages equal to unpaid overtime. The Supreme Court has held that liquidated damages “are not a penalty exacted by the law, but rather compensation to the employee . . . for the loss of the use of [the wages]” — i.e., they substitute for prejudgment interest. <em>Brooklyn Sav. Bank v. O'Neil</em>, 324 U.S. 697, 715 (1945); see <em>Martin v. Cooper Elec. Supply Co.</em>, 940 F.2d 896, 910 (3d Cir. 1991). Accordingly, no separate prejudgment-interest line is calculated for FLSA overtime claims.
      </p>
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">5</sup>&nbsp;<strong>FLSA Statute of Limitations &amp; Workweek:</strong>
        Overtime damages are limited to two years before the complaint filing date, or three years if the violation was willful. 29 U.S.C. § 255(a). The workweek is a fixed, recurring period of 168 consecutive hours designated by the employer; the default here is Monday–Sunday but is configurable per period. 29 C.F.R. § 778.105. ${flsa.filingDate?`Filing date <strong>${dt(flsa.filingDate)}</strong>; SOL cutoff <strong>${dt(flsa.cutoff)}</strong>.`:`<span style="color:var(--gold-d)">Filing date not yet entered — SOL cap not applied to weekly calculation.</span>`}
      </p>`:''}
      ${noInt?`
      <p style="margin-bottom:6px">
        <sup style="font-weight:600;color:var(--navy)">6</sup>&nbsp;<strong>ADEA — No Separate Prejudgment Interest:</strong>
        The ADEA incorporates the FLSA's enforcement scheme. <em>Lorillard v. Pons</em>, 434 U.S. 575, 581 (1978). Because liquidated damages under the ADEA serve as compensation for the loss of the use of wages — substituting for prejudgment interest — courts do not award prejudgment interest in addition to liquidated damages. <em>See Powers v. Grinnell Corp.</em>, 915 F.2d 34, 41 (1st Cir. 1990). <em>Loeffler v. Frank</em>, 490 U.S. 826 (1989) held that ADEA back pay awards do not carry pre-judgment interest. Accordingly, no prejudgment-interest line is calculated for ADEA back pay in this report.
      </p>`:''}
      <p style="margin-bottom:6px"><sup style="font-weight:600;color:var(--navy)">7</sup>&nbsp;<strong>Equal Pay Act (EPA) — Pre-Judgment Interest Applies:</strong> Back pay awarded under the EPA carries pre-judgment interest from the date wages were withheld. Unlike ADEA, the EPA does not bar pre-judgment interest recovery.</p>
        <p style="margin-bottom:0;font-style:italic;color:var(--gray-400)">
        All damages figures presented herein are estimates based on information currently available and are subject to revision. Plaintiff reserves the right to update and supplement these calculations as additional discovery is received, and through the date of judgment or verdict.
      </p>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// 7b. TOAST UTILITY
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { info:'#162240', success:'#1a7a4a', error:'#B83232', warning:'#92400e' };
  const bgs   = { info:'#E8F0FE',  success:'#eafaf1', error:'#fdecea',  warning:'#fff8e6' };
  el.textContent = msg;
  el.style.background = bgs[type]||bgs.info;
  el.style.color = colors[type]||colors.info;
  el.style.border = '1px solid ' + (colors[type]||colors.info);
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display='none'; }, type==='error'?6000:3500);
}

// ─────────────────────────────────────────────
// 8. INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async ()=>{
  updateConnectionStatus();
  await updateCaseSelect();
  renderTab();
  // Close modals on overlay click
  document.getElementById('cases-modal').addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeCasesModal();
  });
  document.getElementById('blob-config-modal').addEventListener('click', e=>{
    if(e.target===e.currentTarget) closeBlobConfigModal();
  });
  // If blob is configured, check connection health silently
  const cfg = getBlobCfg();
  if (cfg) {
    testBlobConnection(cfg).then(ok=>{
      if (!ok) showToast('⚠ Azure Blob Storage connection failed. Check your SAS token has not expired.', 'warning');
    });
  }
});
</script>
